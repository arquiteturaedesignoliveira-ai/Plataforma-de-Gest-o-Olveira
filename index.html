<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<title>Sistema Oliveira</title>
<!-- PWA — instalável e offline -->
<link rel="manifest" href="manifest.webmanifest"/>
<meta name="theme-color" content="#161514"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Oliveira"/>
<link rel="apple-touch-icon" href="apple-touch-icon.png"/>
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png"/>
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png"/>
<script>
if('serviceWorker' in navigator && location.protocol.indexOf('http')===0){
  addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});
}
</script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css"/>
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/pt.js"></script>
<style>
:root{
  /* Paleta 03 — Oficina & Raiz · modo escuro */
  --bg:#161514;
  --panel:#2B2A29;
  --panel2:#41403F;
  --line:#585857;
  --txt:#F7F4F2;
  --dim:#B39E93;
  --warm:#E0D6D0;
  --accent:#A6533A;
  --accent2:#C94D31;
  --hdbg:#0D0C0C;
  --hdtxt:#F7F4F2;
  /* Paleta 04 — Transformação (estados funcionais) */
  --red:#C94D31;
  --green:#00B89C;
  --yellow:#F39A00;
  --blue:#0BA2D9;
  --ciano:#00E5C5;
  --roxo:#8D1CD1;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);font-family:'Montserrat',Helvetica,Arial,sans-serif;font-size:14px;}
button{font-family:inherit;cursor:pointer;}
input,select{font-family:inherit;font-size:14px;}
::-webkit-scrollbar{height:6px;width:6px;}
::-webkit-scrollbar-track{background:var(--panel2);}
::-webkit-scrollbar-thumb{background:var(--line);}

/* HEADER */
.hd{padding:0;position:sticky;top:0;background:var(--hdbg);z-index:10;}
.hd-inner{padding:20px 24px 0;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;max-width:1100px;margin:0 auto;}
.brand-label{font-size:9px;letter-spacing:4px;color:var(--dim);font-weight:600;text-transform:uppercase;margin-bottom:4px;}
.brand-title{font-size:18px;font-weight:300;color:var(--hdtxt);letter-spacing:2px;text-transform:uppercase;}
.hd-actions{display:flex;gap:8px;padding-top:4px;}
.tabs{display:flex;gap:0;border-bottom:1px solid rgba(255,255,255,.1);overflow-x:auto;padding:0 24px;max-width:1100px;margin:0 auto;}
.tab{background:none;border:none;padding:14px 16px;font-size:11px;letter-spacing:2px;font-weight:600;text-transform:uppercase;white-space:nowrap;color:rgba(255,255,255,.4);border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .2s;}
.tab.on{color:var(--warm);border-bottom-color:var(--accent);}
.tab:hover{color:var(--dim);}

/* LAYOUT */
.wrap{padding:24px;max-width:1100px;margin:0 auto;}

/* CARDS MÉTRICAS */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:0;margin-bottom:32px;border:1px solid var(--line);}
.mcard{padding:16px 18px;border-right:1px solid var(--line);background:var(--panel);}
.mcard:last-child{border-right:none;}
.mcard.al{background:#3A1A14;}
.mcard .lb{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:6px;font-weight:600;}
.mcard .vl{font-size:22px;font-weight:300;letter-spacing:-0.5px;color:var(--txt);}
.mcard.al .vl{color:var(--red);}
@media(max-width:600px){.cards{grid-template-columns:repeat(2,1fr);}.mcard{border-bottom:1px solid var(--line);}}

/* BOTÕES */
.btn{background:transparent;border:1px solid var(--line);color:var(--txt);padding:7px 14px;border-radius:0;font-size:11px;letter-spacing:1px;font-weight:600;text-transform:uppercase;transition:background .15s;}
.btn:hover{background:var(--panel2);}
.btn-hd{background:transparent;border:1px solid rgba(255,255,255,.25);color:var(--hdtxt);padding:7px 14px;border-radius:0;font-size:10px;letter-spacing:1.5px;font-weight:600;text-transform:uppercase;}
.btn-hd:hover{background:rgba(255,255,255,.08);}
.btnP{background:var(--accent);border:none;color:#FFFFFF;font-weight:600;padding:9px 18px;border-radius:0;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;transition:background .15s;}
.btnP:hover{background:var(--accent2);}
.btn-ghost{background:none;border:none;color:var(--dim);font-size:11px;letter-spacing:1px;text-transform:uppercase;padding:6px 10px;}
.btn-ghost:hover{color:var(--txt);}

/* LINHAS E SEPARADORES */
.row{display:flex;justify-content:space-between;align-items:center;}
.sec-title{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--dim);font-weight:600;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid var(--line);}

/* PROJETO ROW */
.proj{display:block;width:100%;text-align:left;background:var(--panel);border:none;border-bottom:1px solid var(--line);padding:18px 20px;color:var(--txt);transition:background .15s;}
.proj:first-child{border-top:1px solid var(--line);}
.proj:hover{background:var(--panel2);}
.proj-nome{font-size:15px;font-weight:500;letter-spacing:.5px;margin-bottom:4px;}
.proj-meta{font-size:11px;color:var(--dim);letter-spacing:.5px;}

/* PILL / STATUS */
.pill{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:3px 8px;border-radius:0;}
.muted{font-size:11px;color:var(--dim);}

/* EMPTY STATE */
.empty{text-align:center;padding:48px 24px;color:var(--dim);border:1px solid var(--line);}
.empty-title{font-size:12px;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;}

/* MODAL */
.ov{position:fixed;inset:0;background:rgba(20,18,16,.7);display:flex;align-items:center;justify-content:center;z-index:50;padding:16px;}
.modal{background:var(--panel);width:100%;max-width:500px;border-radius:0;padding:24px;border-top:3px solid var(--accent);max-height:92vh;overflow-y:auto;}
.modal-title{font-size:11px;letter-spacing:3px;text-transform:uppercase;font-weight:700;color:var(--txt);margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid var(--line);}
.fld{margin-bottom:14px;}
.fld .l{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:6px;font-weight:600;display:block;}
.inp{width:100%;padding:10px 12px;border-radius:0;border:1px solid var(--line);background:var(--panel2);color:var(--txt);font-size:13px;transition:border-color .15s;}
.inp:focus{outline:none;border-color:var(--accent);}

/* GANTT */
.gbar{display:flex;border-bottom:1px solid var(--line);background:var(--panel2);}
.barrow{display:flex;align-items:center;min-height:40px;border-top:1px solid var(--line);}
.barrow:hover{background:var(--panel2);}

/* HEAT MAP */
.heat{width:36px;height:36px;margin:2px;border-radius:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;}

/* ATIVIDADE ROW */
.dot{width:7px;height:7px;border-radius:0;flex-shrink:0;}
.ic{width:28px;height:28px;border:1px solid var(--line);background:var(--panel2);color:var(--txt);border-radius:0;font-size:12px;display:flex;align-items:center;justify-content:center;}
.ic:hover{background:var(--line);}
.erow{display:flex;align-items:center;gap:8px;background:var(--panel);border-bottom:1px solid var(--line);padding:8px 12px;}
.erow:first-of-type{border-top:1px solid var(--line);}
.erow.atrasada{background:#3A1A14;border-color:#7A2A1A;}
.ename{flex:1 1 130px;min-width:110px;}
.ename .et{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ename .es{font-size:9px;color:var(--dim);letter-spacing:.5px;margin-top:1px;}
.ef{display:flex;gap:6px;align-items:center;flex-wrap:wrap;flex:2 1 360px;}
.ii{padding:5px 8px;border-radius:0;border:1px solid var(--line);background:var(--panel2);color:var(--txt);font-size:11px;}
.ii:focus{outline:none;border-color:var(--accent);}
.ef select.ii{max-width:120px;}
.ih{display:flex;align-items:center;gap:2px;}
.ihn{width:46px;}
.hs{font-size:10px;color:var(--dim);}
.ef input[type=date].ii{min-width:110px;}

/* ETAPA HEADER */
.etapa-hd{display:flex;align-items:center;gap:10px;padding:14px 0 8px;}
.etapa-nome{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;font-weight:700;}
.etapa-meta{font-size:10px;color:var(--dim);}

/* SEMANA DETALHE */
.wk-detail{background:var(--panel);border:1px solid var(--line);border-top:2px solid var(--accent);padding:16px;margin-bottom:16px;}
.wk-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.wk-nav{background:var(--panel2);border:1px solid var(--line);color:var(--txt);width:28px;height:28px;border-radius:0;font-size:14px;display:flex;align-items:center;justify-content:center;}
.wk-title{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;flex:1;}
.person-row{margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--line);}
.person-row:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.person-label{font-size:11px;font-weight:700;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;letter-spacing:.5px;}
.occ-bar{height:4px;background:var(--line);margin-bottom:8px;}
.occ-fill{height:100%;transition:width .3s;}
.ativ-list{display:flex;flex-direction:column;gap:3px;}
.ativ-chip{display:flex;align-items:center;gap:7px;font-size:10px;padding:5px 8px;background:var(--panel2);border-left:2px solid var(--line);}
.ativ-chip .proj-dot{width:5px;height:5px;flex-shrink:0;}
.ativ-chip .ac-proj{color:var(--dim);font-size:9px;margin-left:auto;white-space:nowrap;letter-spacing:.5px;}
.ativ-chip .ac-h{font-weight:700;white-space:nowrap;color:var(--txt);}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--hdbg);border-top:2px solid var(--accent);color:var(--hdtxt);padding:12px 20px;border-radius:0;font-size:11px;letter-spacing:.5px;z-index:100;display:flex;align-items:center;gap:14px;box-shadow:0 4px 20px rgba(0,0,0,.2);}
.toast button{background:var(--accent);color:#fff;border:none;border-radius:0;padding:4px 12px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;}

/* TABELA GANTT HEADER */
.g-proj-hd{display:block;width:100%;text-align:left;padding:10px 14px;font-size:9px;letter-spacing:3px;font-weight:700;text-transform:uppercase;color:var(--accent2);background:var(--panel2);border:none;border-bottom:1px solid var(--line);border-left:3px solid var(--accent);}

/* SECTION DIVIDER */
.sdiv{height:1px;background:var(--line);margin:24px 0;}

@media(max-width:620px){.erow{flex-wrap:wrap;}.ename{flex:1 1 100%;}.ef{flex:1 1 100%;}}
@media print{.hd,.tabs{display:none;}}

/* FINANCEIRO — SUB-TABS */
.fin-tabs{display:flex;gap:0;border-bottom:1px solid var(--line);margin-bottom:24px;}
.fin-tab{background:none;border:none;padding:10px 16px;font-size:10px;letter-spacing:2px;font-weight:600;text-transform:uppercase;color:var(--dim);border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer;font-family:inherit;}
.fin-tab.on{color:var(--warm);border-bottom-color:var(--accent);}
.fin-tab:hover{color:var(--txt);}

/* PIPELINE TABLE */
.ptable{width:100%;border-collapse:collapse;background:var(--panel);font-size:11px;}
.ptable th{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);font-weight:700;padding:10px 12px;text-align:left;border-bottom:2px solid var(--line);white-space:nowrap;}
.ptable td{padding:10px 12px;border-bottom:1px solid var(--line);vertical-align:middle;}
.ptable tr:hover td{background:var(--panel2);}
.ptable .ti{width:100%;padding:5px 7px;border:1px solid var(--line);background:transparent;color:var(--txt);font-size:11px;font-family:inherit;}
.ptable .ti:focus{outline:none;border-color:var(--accent);background:var(--panel);}

/* SENHA OVERLAY */
.senha-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;}
.senha-box{background:var(--panel);border-top:3px solid var(--accent);padding:32px;width:100%;max-width:360px;}
.senha-erro{font-size:11px;color:var(--red);letter-spacing:.5px;margin-top:8px;min-height:16px;}

/* CHART CONTAINERS */
.charts-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-bottom:24px;}
.chart-box{background:var(--panel);border:1px solid var(--line);padding:20px;}
.chart-title{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);font-weight:700;margin-bottom:16px;}

/* FUNIL */
.funil-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.funil-bar-wrap{flex:1;height:28px;background:var(--panel2);position:relative;}
.funil-bar{height:100%;transition:width .4s;}
.funil-label{font-size:10px;font-weight:600;letter-spacing:.5px;width:100px;text-align:right;}
.funil-val{font-size:10px;color:var(--dim);width:50px;letter-spacing:.5px;}

/* CARDS COMPACTA */
.cards-bar{display:flex;align-items:stretch;background:var(--panel);border:1px solid var(--line);margin-bottom:8px;overflow:hidden;}
.cards-bar-item{padding:9px 13px;border-right:1px solid var(--line);flex:1;min-width:0;}
.cb-lbl{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);font-weight:600;margin-bottom:2px;}
.cb-val{font-size:14px;font-weight:300;color:var(--txt);}
.cb-val.al{color:var(--red);}
.cards-expand-btn{padding:9px 12px;background:none;border:none;border-left:1px solid var(--line);color:var(--dim);font-size:14px;cursor:pointer;flex-shrink:0;transition:transform .2s;display:flex;align-items:center;}
.cards-expand-btn.open{transform:rotate(180deg);}

/* ETAPA ACCORDION */
.etapa-hd-row{display:flex;align-items:center;}
.etapa-hd-btn{display:flex;align-items:center;gap:10px;flex:1;background:none;border:none;padding:10px 0 6px;cursor:pointer;text-align:left;font-family:inherit;}
.etapa-body.closed{display:none;}
.etapa-chevron{font-size:10px;color:var(--dim);flex-shrink:0;transition:transform .15s;margin-left:6px;}
.etapa-chevron.open{transform:rotate(180deg);}

/* DATE RANGE */
.date-range{display:flex;align-items:center;background:var(--panel2);border:1px solid var(--line);}
.date-range .ii{border:none;background:transparent;flex:1;min-width:80px;}
.date-range .ii:focus{outline:none;background:rgba(255,255,255,.04);}
.date-range-sep{font-size:10px;color:var(--dim);padding:0 2px;flex-shrink:0;pointer-events:none;user-select:none;}

/* CAPACITY DRILL-DOWN */
.cap-drill-back{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
.cap-day-col{flex:1;min-width:0;text-align:center;}
.cap-day-name{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);font-weight:600;}
.cap-day-date{font-size:9px;color:var(--dim);margin-bottom:4px;}

/* LOGIN SCREEN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--bg);}
.login-box{width:100%;max-width:380px;}
.login-person{display:block;width:100%;text-align:left;background:var(--panel);border:none;border-bottom:1px solid var(--line);padding:16px 20px;color:var(--txt);cursor:pointer;font-family:inherit;transition:background .15s;}
.login-person:first-of-type{border-top:1px solid var(--line);}
.login-person:hover{background:var(--panel2);}
.login-person .lp-nome{font-size:15px;font-weight:500;letter-spacing:.5px;margin-bottom:3px;}
.login-person .lp-func{font-size:11px;color:var(--dim);letter-spacing:.5px;}

/* CRONÔMETRO FLUTUANTE */
#timer-float{position:fixed;bottom:16px;right:16px;width:270px;background:var(--panel);border:1px solid var(--line);border-top:2px solid var(--accent);box-shadow:0 8px 28px rgba(0,0,0,.55);z-index:60;user-select:none;}
.tf-hd{display:flex;align-items:center;gap:8px;padding:9px 12px 6px;cursor:grab;touch-action:none;}
.tf-hd:active{cursor:grabbing;}
.tf-ic{background:none;border:none;color:var(--dim);font-size:13px;cursor:pointer;padding:2px 5px;flex-shrink:0;font-family:inherit;}
.tf-ic:hover{color:var(--txt);}
.tf-btn{flex:1;background:transparent;border:1px solid var(--line);color:var(--txt);font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:6px 4px;cursor:pointer;font-family:inherit;white-space:nowrap;}
.tf-btn:hover{background:var(--panel2);}
.tf-item{display:flex;align-items:center;gap:7px;width:100%;background:none;border:none;border-bottom:1px solid var(--line);padding:6px 4px;cursor:pointer;font-family:inherit;color:var(--txt);}
.tf-item:hover{background:var(--panel2);}
@keyframes tfpulse{0%,100%{opacity:1}50%{opacity:.3}}
@media(max-width:600px){#timer-float{width:calc(100vw - 24px);right:12px;bottom:12px;}}

/* TIMER BANNER */
.timer-banner{background:var(--accent);padding:8px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;}
.timer-dot{width:7px;height:7px;background:#fff;border-radius:50%;flex-shrink:0;}
.timer-label{flex:1;color:#fff;font-size:10px;font-weight:600;letter-spacing:.5px;}
.btn-timer-stop{background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.3);color:#fff;padding:5px 10px;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;font-family:inherit;border-radius:0;}

/* TIMER ACTION BUTTONS */
.timer-btn{display:inline-flex;align-items:center;justify-content:center;gap:4px;padding:6px 10px;border:none;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;font-family:inherit;flex-shrink:0;border-radius:0;}
.timer-start{background:var(--green);color:#161514;}
.timer-start:hover{opacity:.9;}
.timer-stop{background:var(--red);color:#fff;}
.timer-stop:hover{opacity:.9;}

/* USER CHIP */
.user-chip{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--dim);padding:6px 10px;border:1px solid var(--line);white-space:nowrap;}

/* HOME DASHBOARD */
.dash-card{background:var(--panel);border:1px solid var(--line);padding:16px 20px;margin-bottom:8px;}
.dash-card-title{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);font-weight:700;margin-bottom:12px;}
.ativ-item{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--line);font-size:11px;}
.ativ-item:last-child{border-bottom:none;}
.ativ-item .ai-proj{font-size:9px;color:var(--dim);letter-spacing:.3px;}

/* FLATPICKR DARK OVERRIDES */
.flatpickr-calendar{background:var(--panel);border:1px solid var(--line);box-shadow:0 8px 24px rgba(0,0,0,.5);}
.flatpickr-day{color:var(--txt);}
.flatpickr-day:hover,.flatpickr-day:focus{background:var(--panel2);border-color:var(--line);}
.flatpickr-day.selected,.flatpickr-day.startRange,.flatpickr-day.endRange{background:var(--accent);border-color:var(--accent);color:#fff;}
.flatpickr-day.inRange{background:rgba(166,83,58,.25);border-color:transparent;box-shadow:-5px 0 0 rgba(166,83,58,.25),5px 0 0 rgba(166,83,58,.25);}
.flatpickr-months .flatpickr-month,.flatpickr-weekdays,.span.flatpickr-weekday{background:var(--panel2);color:var(--txt);}
.flatpickr-current-month input.cur-year,.flatpickr-current-month .flatpickr-monthDropdown-months{color:var(--txt);}
.flatpickr-monthDropdown-months{background:var(--panel);}
.flatpickr-monthDropdown-month{background:var(--panel);}
.numInputWrapper span.arrowUp:after{border-bottom-color:var(--dim);}
.numInputWrapper span.arrowDown:after{border-top-color:var(--dim);}
.flatpickr-day.flatpickr-disabled{color:var(--line);}
.fp-range,.fp-modal-range{cursor:pointer!important;}

/* MOBILE IMPROVEMENTS */
@media(max-width:600px){
  .hd-inner{padding:10px 14px 0;}
  .brand-title{font-size:14px;letter-spacing:1px;}
  .tabs{padding:0 10px;}
  .tab{padding:10px 11px;font-size:10px;letter-spacing:1px;}
  .wrap{padding:10px;}
  .cards-bar-item{padding:7px 9px;}
  .cb-val{font-size:13px;}
  .ef input[type=date].ii{min-width:85px;}
  .erow{gap:5px;padding:6px 8px;}
  .charts-grid{grid-template-columns:1fr;}
  .modal{padding:16px;}
  .fin-tab{padding:8px 11px;font-size:9px;}
}

function extenso(v){
  v=Math.round(+v||0);if(!v)return "zero reais";
  const u=["","um","dois","três","quatro","cinco","seis","sete","oito","nove","dez","onze","doze","treze","quatorze","quinze","dezesseis","dezessete","dezoito","dezenove"];
  const dz=["","","vinte","trinta","quarenta","cinquenta","sessenta","setenta","oitenta","noventa"];
  const ce=["","cento","duzentos","trezentos","quatrocentos","quinhentos","seiscentos","setecentos","oitocentos","novecentos"];
  const f=n=>{
    if(!n)return"";if(n===100)return"cem";
    const c=Math.floor(n/100),r=n%100;let s=[];
    if(c)s.push(ce[c]);
    if(r&&r<20)s.push(u[r]);
    else if(r){const d2=Math.floor(r/10),u2=r%10;s.push(dz[d2]+(u2?" e "+u[u2]:""));}
    return s.join(" e ");
  };
  const mi=Math.floor(v/1e6),mil=Math.floor(v%1e6/1e3),rr=v%1e3;
  const parts=[];
  if(mi)parts.push(f(mi)+(mi>1?" milhões":" milhão"));
  if(mil)parts.push(mil===1?"mil":f(mil)+" mil");
  if(rr)parts.push(f(rr));
  return parts.join(" e ")+(v>1?" reais":" real");
}

function gerarParcelas(d){
  const out=[];const tot=+d.valorTotal||0;const ent=+d.entrada||0;const n=+d.numParcelas||0;
  if(ent>0)out.push({id:uid(),label:"Entrada",data:d.assinatura||new Date().toISOString().slice(0,10),valor:ent,pago:false});
  const restante=Math.max(0,tot-ent);
  const vp=n>0?Math.round(restante/n*100)/100:0;
  if(n>0&&vp>0){
    let base=d.dataInicio?D(d.dataInicio):(d.assinatura?D(d.assinatura):new Date());
    if(!d.dataInicio){base=new Date(base);base.setMonth(base.getMonth()+1);}
    const dia=Math.min(Math.max(+d.diaVenc||base.getDate(),1),28);
    for(let i=0;i<n;i++){
      const di=new Date(base.getFullYear(),base.getMonth()+i,dia);
      const y=di.getFullYear(),m=String(di.getMonth()+1).padStart(2,'0'),dd2=String(di.getDate()).padStart(2,'0');
      out.push({id:uid(),label:"Parcela "+(i+1)+"/"+n,data:y+"-"+m+"-"+dd2,valor:vp,pago:false});
    }
  }
  return out;
}

function taxaHora(pessoa){
  if(S.fin.taxas[pessoa]!=null)return S.fin.taxas[pessoa];
  const e=S.equipe.find(x=>x.pessoa===pessoa);
  if(!e)return 30;

}
function custoEstimado(projNome){
  return S.ativ.filter(a=>a.projeto===projNome&&a.status!=="Cancelada").reduce((s,a)=>{return s+a.horas*taxaHora(a.resp);},0);
}
function valorSugerido(projNome){
  const p=S.projs.find(x=>x.nome===projNome);
  const custo=custoEstimado(projNome);
  if(!custo)return 0;
  const overhead=(S.fin.lucro+S.fin.impostos+S.fin.negociacao)/100;
  const multi=S.fin.multi[p?.padrao||"Médio"]||1;
  return custo/(1-overhead)*multi;
}
function margemReal(projNome){
  const p=S.projs.find(x=>x.nome===projNome);
  const vc=+(p?.valorContratado||0);
  if(!vc)return null;
  const custo=custoEstimado(projNome);
  const impostos=vc*(S.fin.impostos/100);
  return vc-custo-impostos;
}

// ===== LIXEIRA SINCRONIZADA =====
// Cada exclusão vira uma "lápide" que viaja na sincronização: mesmo que outro
// aparelho ainda tenha o registro, a mesclagem sabe que ele foi excluído e não
// o ressuscita. A lixeira permite restaurar (o registro volta e propaga) ou
// excluir definitivamente (a lápide fica, invisível, só como supressora).
const TRASH_TIPOS={projs:"Projeto",ativ:"Atividade",clientes:"Cliente",equipe:"Pessoa",propostas:"Proposta",contratos:"Contrato",rdos:"RDO",espec:"Especificação",timeEntries:"Registro de horas"};
function trashCol(tipo){
  if(tipo==="propostas")return S.fin.propostas;
  if(tipo==="contratos")return S.fin.contratos;
  return S[tipo];
}
function toTrash(tipo,obj,label){
  if(!obj||obj.id==null)return;
  S.trash=S.trash||[];
  const k=tipo+"|"+obj.id;
  S.trash=S.trash.filter(t=>t.tipo+"|"+t.id!==k); // uma lápide por registro (a mais recente)
  S.trash.push({id:obj.id,tipo,nome:label||obj.nome||obj.cliente||(obj.n?entOf(obj.n):"")||"(sem nome)",data:new Date().toISOString(),ts:Date.now(),obj});
}
// Remove das coleções tudo que tem lápide ativa (não restaurada)
function applyTombstones(){
  const del={};
  (S.trash||[]).forEach(t=>{if(!t.restored)(del[t.tipo]=del[t.tipo]||new Set()).add(t.id);});
  const f=(arr,tipo)=>del[tipo]?arr.filter(x=>!del[tipo].has(x.id)):arr;
  S.projs=f(S.projs,"projs");S.ativ=f(S.ativ,"ativ");S.clientes=f(S.clientes,"clientes");
  S.equipe=f(S.equipe,"equipe");S.rdos=f(S.rdos,"rdos");S.espec=f(S.espec,"espec");
  S.timeEntries=f(S.timeEntries,"timeEntries");
  S.fin.propostas=f(S.fin.propostas||[],"propostas");S.fin.contratos=f(S.fin.contratos||[],"contratos");
}
// Mescla lápides entre aparelhos: para a mesma lápide, vence a versão com
// carimbo mais novo (assim uma restauração feita num aparelho vale em todos).
function mergeTrash(localArr,cloudArr){
  const m=new Map();
  const put=t=>{if(!t||t.id==null)return;const k=t.tipo+"|"+t.id;const ex=m.get(k);if(!ex||(+t.ts||0)>=(+ex.ts||0))m.set(k,t);};
  (cloudArr||[]).forEach(put);(localArr||[]).forEach(put);
  return Array.from(m.values());
}
function trashRestore(key){
  const t=(S.trash||[]).find(x=>x.tipo+"|"+x.id===key);
  if(!t)return;
  t.restored=true;t.ts=Date.now();
  if(t.obj){
    const col=trashCol(t.tipo);
    if(col&&!col.some(x=>x.id===t.id))col.push(t.obj);
  }
  save();r();
}
function trashPurge(key){
  const t=(S.trash||[]).find(x=>x.tipo+"|"+x.id===key);
  if(!t)return;
  t.purged=true;t.ts=Date.now();delete t.obj;
  save();r();
}
function applyCloud(o){
  S.equipe=o.equipe||S.equipe;
  S.projs=o.projs||[];S.ativ=o.ativ||[];S.timeEntries=o.timeEntries||[];S.clientes=o.clientes||[];S.rdos=o.rdos||[];S.espec=o.espec||[];S.trash=o.trash||[];
  if(o.fin)S.fin={...FIN_DEFAULT,...o.fin,taxas:{...(o.fin.taxas||{})},propostas:o.fin.propostas||[]};
  if(!S.fin.tercTemplates)S.fin.tercTemplates=TERC_TPL_DEFAULT();
  if(!S.fin.fatores)S.fin.fatores={};
  if(!S.fin.participacao)S.fin.participacao={};
  if(!S.fin.contratos)S.fin.contratos=[];
  S.equipe.forEach((e,i)=>{if(e.isDiretor===undefined)e.isDiretor=e.funcao?.toLowerCase().includes('diretor')||i===0;});
  persistLocal();
}
// Mescla por registro (id): o que só existe na nuvem entra, o que só existe
// aqui permanece; se o MESMO registro existir dos dois lados, o local vence
// (é a versão mais recente vista nesta máquina). Nada é descartado em bloco.
function mergeById(localArr,cloudArr){
  const m=new Map();
  (cloudArr||[]).forEach(x=>{if(x&&x.id!=null)m.set(x.id,x);});
  (localArr||[]).forEach(x=>{if(x&&x.id!=null)m.set(x.id,x);});
  return Array.from(m.values());
}
function mergeCloud(rec){
  S.equipe=mergeById(S.equipe,rec.equipe);
  S.projs=mergeById(S.projs,rec.projs);
  S.ativ=mergeById(S.ativ,rec.ativ);
  S.timeEntries=mergeById(S.timeEntries,rec.timeEntries);
  S.clientes=mergeById(S.clientes,rec.clientes);
  S.rdos=mergeById(S.rdos,rec.rdos);
  S.espec=mergeById(S.espec,rec.espec);
  const cf=rec.fin||{};
  S.fin={...FIN_DEFAULT,...cf,...S.fin,
    taxas:{...(cf.taxas||{}),...(S.fin.taxas||{})},
    fatores:{...(cf.fatores||{}),...(S.fin.fatores||{})},
    participacao:{...(cf.participacao||{}),...(S.fin.participacao||{})},
    multi:{...(cf.multi||{}),...(S.fin.multi||{})},
    tercTemplates:S.fin.tercTemplates||cf.tercTemplates||TERC_TPL_DEFAULT(),
    propostas:mergeById(S.fin.propostas,cf.propostas),
    contratos:mergeById(S.fin.contratos,cf.contratos)
  };
  S.trash=mergeTrash(S.trash,rec.trash);
  applyTombstones();
  S.equipe.forEach((e,i)=>{if(e.isDiretor===undefined)e.isDiretor=e.funcao?.toLowerCase().includes('diretor')||i===0;});
  persistLocal();
}
let _syncBusy=false;
function syncPush(interactive){
  if(!SYNC.clientId)return;
  if(_syncBusy){clearTimeout(_syncTimer);_syncTimer=setTimeout(()=>syncPush(false),3000);return;}
  gToken(async tok=>{
    if(!tok){setSyncStatus("desconectado — clique em Conectar ao Google",true);return;}
    _syncBusy=true;
    try{
      setSyncStatus("sincronizando…");
      if(!SYNC.fileId)SYNC.fileId=await gFindFile(tok);
      // Antes de enviar: se a nuvem avançou desde a nossa última sincronização,
      // mescla o que veio de lá — assim NUNCA sobrescrevemos alterações de outro aparelho.
      if(SYNC.fileId){
        const r0=await fetch("https://www.googleapis.com/drive/v3/files/"+SYNC.fileId+"?alt=media",{headers:{Authorization:"Bearer "+tok}});
        if(r0.ok){
          const rec=await r0.json();
          const cloudAt=+(rec.updatedAt||0);
          if(cloudAt>(+SYNC.baseAt||0)){mergeCloud(rec);r();}
        }
      }
      const payload=syncPayload();
      if(!SYNC.fileId){
        SYNC.fileId=await gCreateFile(tok,payload);
      }else{
        const r=await fetch("https://www.googleapis.com/upload/drive/v3/files/"+SYNC.fileId+"?uploadType=media",{
          method:"PATCH",headers:{Authorization:"Bearer "+tok,"Content-Type":"application/json"},body:JSON.stringify(payload)});
        if(!r.ok)throw new Error("HTTP "+r.status);
      }
      try{localStorage.setItem("oad_updated",String(payload.updatedAt));}catch(e){}
      SYNC.baseAt=payload.updatedAt;SYNC.last=Date.now();syncSaveCfg();
      setSyncStatus("✓ sincronizado às "+new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}));
    }catch(e){setSyncStatus("erro ao sincronizar — "+e.message,true);}
    finally{_syncBusy=false;}
  },interactive);
}
function syncPull(manual){
  if(!SYNC.clientId)return;
  gToken(async tok=>{
    if(!tok){if(manual)setSyncStatus("desconectado — clique em Conectar ao Google",true);return;}
    try{
      setSyncStatus("baixando do Drive…");
      if(!SYNC.fileId)SYNC.fileId=await gFindFile(tok);
      if(!SYNC.fileId){setSyncStatus("nenhum dado na nuvem ainda — use Enviar agora",true);return;}
      syncSaveCfg();
      const r2=await fetch("https://www.googleapis.com/drive/v3/files/"+SYNC.fileId+"?alt=media",{headers:{Authorization:"Bearer "+tok}});
      if(!r2.ok)throw new Error("HTTP "+r2.status);
      const rec=await r2.json();
      const localAt=+(localStorage.getItem("oad_updated")||0);
      const cloudAt=+(rec.updatedAt||0);
      if(manual){
        // "Baixar do Drive" = substituição explícita pela versão da nuvem
        if(!confirm("Substituir os dados deste aparelho pela versão da nuvem?\n\nAlterações locais ainda não sincronizadas serão perdidas. Para juntar em vez de substituir, use Enviar agora."))
          {setSyncStatus("download cancelado");return;}
        applyCloud(rec);
        try{localStorage.setItem("oad_updated",String(cloudAt||Date.now()));}catch(e){}
        SYNC.baseAt=cloudAt;SYNC.last=Date.now();syncSaveCfg();
        r();setTimeout(()=>setSyncStatus("✓ dados substituídos pelos da nuvem"),50);
      }else if(cloudAt>(+SYNC.baseAt||0)){
        // Automático: MESCLA (nunca descarta o que só existe aqui)
        mergeCloud(rec);
        SYNC.baseAt=cloudAt;SYNC.last=Date.now();syncSaveCfg();
        r();setTimeout(()=>setSyncStatus("✓ dados atualizados do Drive"),50);
        if(cloudAt<localAt)syncPush(false); // local também tinha novidades → sobe o resultado
      }else if(cloudAt<localAt){
        syncPush(false);
      }else{
        setSyncStatus("✓ já sincronizado");
      }
    }catch(e){setSyncStatus("erro ao baixar — "+e.message,true);}
  },manual);
}
function syncConnect(){
  if(!SYNC.clientId){setSyncStatus("cole o Client ID primeiro",true);return;}
  gToken(async tok=>{
    if(!tok)return;
    try{
      setSyncStatus("conectado — verificando dados…");
      SYNC.fileId=await gFindFile(tok);
      if(SYNC.fileId){syncSaveCfg();syncPull(false);}
      else syncPush(true);
    }catch(e){setSyncStatus("erro — "+e.message,true);}
  },true);
}

function doUndo(){if(!_undoStack.length)return;const snap=_undoStack.pop();S.ativ=snap.ativ;S.projs=snap.projs;save();r();}

const D=s=>{const[y,m,d]=s.split("-").map(Number);return new Date(y,m-1,d);};
const fmt=dt=>dt.toLocaleDateString("pt-BR",{day:"2-digit",month:"short"});
const fmtFull=dt=>dt.toLocaleDateString("pt-BR",{day:"2-digit",month:"short",year:"numeric"});
const fmtDate=dt=>dt.toLocaleDateString("pt-BR",{day:"2-digit",month:"long",year:"numeric"});
const fmtLong=dt=>{const s=dt.toLocaleDateString("pt-BR",{day:"2-digit",month:"long"});return s.replace(/^\d+\s+de\s+/,m=>m).replace(/([a-z])/,(m,c,i)=>i===s.indexOf('d')+3?c.toUpperCase():c);};
// "12 de Julho" — capitaliza o mês
const fmtMes=dt=>{const d=String(dt.getDate()).padStart(2,'0');const m=dt.toLocaleDateString("pt-BR",{month:"long"});return d+' de '+m.charAt(0).toUpperCase()+m.slice(1);};
const mon=dt=>{const x=new Date(dt);const w=(x.getDay()+6)%7;x.setDate(x.getDate()-w);x.setHours(0,0,0,0);return x;};
const aw=(dt,n)=>{const x=new Date(dt);x.setDate(x.getDate()+n*7);return x;};
const wspan=(a,b)=>Math.round((mon(b)-mon(a))/(7*864e5))+1;
const dd=(a,b)=>Math.round((b-a)/864e5);
const esc=s=>String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const today=()=>{const h=new Date();h.setHours(0,0,0,0);return h;};
const isAtrasada=a=>{if(!a.fim||a.status==="Concluída"||a.status==="Cancelada")return false;return D(a.fim)<today();};

function timeline(){
  const b=S.ativ.filter(a=>a.ini&&a.fim);
  if(!b.length){const m=mon(new Date());return{min:m,sem:[...Array(12)].map((_,i)=>aw(m,i)),tot:84};}
  let mn=D(b[0].ini),mx=D(b[0].fim);
  b.forEach(a=>{if(D(a.ini)<mn)mn=D(a.ini);if(D(a.fim)>mx)mx=D(a.fim);});
  const m0=mon(mn),n=Math.max(12,wspan(mn,mx)+1);
  return{min:m0,sem:[...Array(n)].map((_,i)=>aw(m0,i)),tot:Math.max(1,dd(m0,aw(m0,n-1))+1)};
}
function cap(){
  const tl=timeline();
  return S.equipe.map(e=>{
    const disp=e.hd*e.ds;
    const linha=tl.sem.map(seg=>{
      const sf=aw(seg,1);let al=0;const ativs=[];
      S.ativ.filter(a=>a.resp===e.pessoa&&a.status!=="Cancelada"&&a.ini&&a.fim).forEach(a=>{
        const ai=D(a.ini),af=D(a.fim);
        if(ai<sf&&af>=seg){const h=a.horas/wspan(ai,af);al+=h;ativs.push({...a,hSem:Math.round(h*10)/10});}
      });
      return{disp,al,oc:disp?al/disp:0,ativs};
    });
    return{pessoa:e.pessoa,disp,linha};
  });
}
const sinal=o=>o>1?"#A6533A":o>=0.85?"#F39A00":o>0?"#00B89C":"#CFC6C0";
const sinalTxt=o=>o>1?"#FFFFFF":o>=0.85?"#161514":o>0?"#161514":"#878685";

// ===== CRONÔMETRO FLUTUANTE =====
const fmtHMS=ms=>{ms=Math.max(0,Math.round(ms/1000));const h=Math.floor(ms/3600),m=Math.floor(ms%3600/60),s=ms%60;return String(h).padStart(2,'0')+":"+String(m).padStart(2,'0')+":"+String(s).padStart(2,'0');};
function timerElapsedMs(){
  if(!S.timer)return 0;
  const acc=+S.timer.accumMs||0;
  return S.timer.paused?acc:acc+(Date.now()-new Date(S.timer.start).getTime());
}
function timerStart(ativId){
  const a=S.ativ.find(x=>x.id===ativId);if(!a)return;
  const iso=new Date().toISOString();
  S.timer={ativId,start:iso,pessoa:S.usuario.pessoa,projNome:a.projeto,n:a.n,accumMs:0,paused:false,log:[{t:iso,ev:"início"}]};
  a.status="Em andamento";
  save();r();
}
function timerPause(){
  if(!S.timer||S.timer.paused)return;
  S.timer.accumMs=(+S.timer.accumMs||0)+(Date.now()-new Date(S.timer.start).getTime());
  S.timer.paused=true;
  (S.timer.log=S.timer.log||[]).push({t:new Date().toISOString(),ev:"pausa"});
  save();tfRender();
}
function timerResume(){
  if(!S.timer||!S.timer.paused)return;
  S.timer.start=new Date().toISOString();
  S.timer.paused=false;
  (S.timer.log=S.timer.log||[]).push({t:new Date().toISOString(),ev:"retomada"});
  save();tfRender();
}
function _timerRegistrar(evFinal){
  const t=S.timer;if(!t)return;
  const fimIso=new Date().toISOString();
  const total=timerElapsedMs();
  (t.log=t.log||[]).push({t:fimIso,ev:evFinal});
  S.timeEntries.push({id:uid(),ativId:t.ativId,pessoa:t.pessoa,projNome:t.projNome,n:t.n,
    inicio:t.log[0]?.t||t.start,fim:fimIso,horas:Math.round(total/360000)/10,eventos:t.log});
}
function timerStop(){
  if(!S.timer)return;
  _timerRegistrar("finalização");
  S.timer=null;
  save();r();
}
function timerSwitch(ativId){
  if(S.timer){
    if(S.timer.ativId===ativId)return;
    _timerRegistrar("troca de atividade");
    S.timer=null;
  }
  timerStart(ativId);
}

function tfCor(pct,plan){return plan<=0?"var(--blue)":pct>=80?"var(--red)":pct>=50?"var(--yellow)":"var(--green)";}
function tfData(){

  const plan=(a?.horas||0)*3600000;
  const pct=plan>0?el/plan*100:0;
  return {a,el,plan,rest:plan-el,pct,cor:tfCor(pct,plan)};
}

  let body="";

  else if(S.tab==="inicio")body=vInicio();
  else if(S.tab==="minhas")body=vMinhas();
  else if(S.tab==="obra")body=vObra();
  else if(isDir&&S.tab==="projetos")body=vProjetos(tl);
  else if(S.tab==="espec")body=vEspec();
  else if(isDir&&S.tab==="clientes")body=vClientes();
  else if(S.tab==="comercial"&&(isDir||S.fin.senhaFin))body=vComercial();
  else if(S.tab==="financeiro"&&(isDir||S.fin.senhaFin))body=vFinanceiro();
  else if(isDir&&S.tab==="parametros")body=vParametrosTab();
  else body=vInicio();
  const dirTabs=[["inicio","Início"],["comercial","Comercial"],["projetos","Projetos"],["espec","Especificação"],["obra","Obra"],["clientes","Clientes"],["financeiro","Financeiro"],["parametros","Parâmetros"]];
  const eqTabs=[["inicio","Início"],["minhas","Atividades"],["espec","Especificação"],["obra","Obra"],...(S.fin.senhaFin?[["comercial","Comercial"],["financeiro","Financeiro"]]:[])];
  const tabs=isDir?dirTabs:eqTabs;
  const activeTab=S.proj?"projetos":S.tab;
  return `<div class="hd">
  <div class="hd-inner">
    <div><div class="brand-label">Wallisson Oliveira · Arquitetura & Interiores</div><div class="brand-title">Sistema de Gestão</div></div>
    <div class="hd-actions">
      <div class="user-chip">${esc(S.usuario.pessoa)}</div>
      <button class="btn-hd" data-act="logout">Sair</button>
      <button class="btn-hd" data-act="agentes" style="color:var(--accent2);border-color:var(--accent)">✦ Agentes</button>
      ${isDir?`<button class="btn-hd" data-act="import">Importar</button><button class="btn-hd" data-act="export">Exportar</button>`:""}
    </div>
  </div>
  <div class="tabs">${tabs.map(([k,l])=>`<button class="tab ${activeTab===k?"on":""}" data-tab="${k}">${l}</button>`).join("")}</div>
  </div>
  <div class="wrap">${isDir?cards():""}${body}</div>${S.modal?modalHtml():""}<input type="file" id="fileIn" accept=".xlsx,.csv" style="display:none"/>`;
}

function vInicio(){
  const isDir=S.usuario?.role==='diretor';
  const pessoa=S.usuario?.pessoa||'';
  const agora=new Date();
  const hr=agora.getHours();
  const saudacao=hr<12?'Bom dia':hr<18?'Boa tarde':'Boa noite';
  const h=today();
  const minhasAtiv=S.ativ.filter(a=>a.resp===pessoa&&a.status!=='Cancelada'&&a.status!=='Concluída');
  const horasHoje=S.timeEntries.filter(e=>{
    if(e.pessoa!==pessoa)return false;
    const d=new Date(e.fim||e.inicio);return d>=h;
  }).reduce((s,e)=>s+(e.horas||0),0);

  let out=`<div style="margin-bottom:16px;display:flex;align-items:flex-end;justify-content:space-between;gap:12px;flex-wrap:wrap">
    <div>
      <div style="font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:4px">${fmtDate(agora)}</div>
      <div style="font-size:20px;font-weight:300">${saudacao}, <strong style="font-weight:600">${esc(pessoa)}</strong>.</div>
    </div>
    ${isDir?`<div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn" data-act="newcliente">+ Novo cliente</button>
      <button class="btnP" data-act="neworc">+ Novo orçamento</button>
    </div>`:""}
  </div>`;

  // ── RESUMO PROJETOS (Cronograma 2/3 + Capacidade 1/3) ──
  const tl=timeline();const c=cap();
  const projs3m=[...new Set(S.ativ.filter(a=>a.ini&&a.fim&&a.status!=='Cancelada').map(a=>a.projeto))];
  const agora3m=new Date(h);agora3m.setMonth(agora3m.getMonth()+3);

  // Gantt 3 meses: calcular janela Jul/Ago/Set a partir de hoje
  const m3min=h;const m3tot=dd(m3min,agora3m)||1;
  const px3=d=>Math.min(100,Math.max(0,d/m3tot*100));
  // Labels dos 3 meses
  const mesLabels=[];for(let i=0;i<3;i++){const d=new Date(h);d.setMonth(d.getMonth()+i);mesLabels.push(d.toLocaleDateString('pt-BR',{month:'short'}).toUpperCase());}

  let ganttRows='';
  projs3m.forEach(nm=>{
    const segs=S.ativ.filter(a=>a.projeto===nm&&a.ini&&a.fim&&a.status!=='Cancelada');
    if(!segs.length)return;
    let mn=D(segs[0].ini),mx=D(segs[0].fim);
    segs.forEach(a=>{if(D(a.ini)<mn)mn=D(a.ini);if(D(a.fim)>mx)mx=D(a.fim);});
    if(mx<m3min)return; // projeto já terminou
    const off=px3(dd(m3min,mn));
    const w=Math.max(px3(dd(mn,mx)+1),2);
    const cor=PCOR(S.projs.find(p=>p.nome===nm)?.status||'Ativo');
    ganttRows+=`<button data-open="${esc(nm)}" style="display:flex;align-items:center;width:100%;background:none;border:none;border-bottom:1px solid var(--line);padding:0;cursor:pointer;font-family:inherit;min-height:32px">
      <div style="width:100px;padding:0 8px 0 0;font-size:10px;font-weight:600;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:left;flex-shrink:0">${esc(nm)}</div>
      <div style="flex:1;position:relative;height:32px">
        <div style="position:absolute;left:${off}%;width:${w}%;top:8px;height:16px;background:${cor};opacity:.85;border-radius:2px"></div>
      </div>
    </button>`;
  });
  if(!ganttRows)ganttRows=`<div style="font-size:11px;color:var(--dim);padding:12px 0">Nenhum projeto com datas cadastradas.</div>`;

  // Capacidade 3 semanas
  const sem3=tl.sem.slice(0,3);
  let capHeader='';let capRows='';
  if(sem3.length&&c.length){
    capHeader=`<div style="display:grid;grid-template-columns:40px repeat(${sem3.length},1fr);gap:2px;margin-bottom:4px">
      <div></div>${sem3.map((s,i)=>`<div style="font-size:8px;color:${i===0?'var(--accent)':'var(--dim)'};text-align:center;letter-spacing:.5px;font-weight:${i===0?'700':'400'}">${fmt(s).split(' ')[0]}</div>`).join('')}
    </div>`;
    c.forEach(p=>{
      capRows+=`<div style="display:grid;grid-template-columns:40px repeat(${sem3.length},1fr);gap:2px;margin-bottom:2px;align-items:center">
        <div style="font-size:10px;font-weight:600;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(p.pessoa.split(' ')[0])}</div>
        ${p.linha.slice(0,3).map((s,i)=>`<button data-semsel="${i}" style="height:22px;background:${sinal(s.oc)};border:none;border-radius:3px;cursor:pointer;font-size:8px;font-weight:700;color:${sinalTxt(s.oc)};font-family:inherit" title="${Math.round(s.al)}h/${s.disp}h">${s.oc>0?Math.round(s.oc*100)+'%':''}</button>`).join('')}
      </div>`;
    });
  }else{
    capRows=`<div style="font-size:11px;color:var(--dim)">Sem dados de capacidade.</div>`;
  }

  out+=`<div style="border:1px solid var(--line);border-radius:0;margin-bottom:12px">
    <div style="display:flex;align-items:center;gap:8px;padding:9px 14px;background:var(--panel2)">
      <span style="font-size:9px;letter-spacing:2px;text-transform:uppercase;font-weight:700;color:var(--dim)">Resumo projetos</span>
      <span style="font-size:10px;background:var(--panel);color:var(--dim);padding:1px 7px">${projs3m.length} projeto${projs3m.length!==1?'s':''}</span>
    </div>
    <div style="display:flex;border-top:1px solid var(--line)">
      <div style="flex:2;padding:12px 14px;border-right:1px solid var(--line)">
        <div style="font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);margin-bottom:8px;font-weight:600">Cronograma · 3 meses</div>
        <div style="display:flex;padding-left:100px;margin-bottom:4px;gap:0">
          ${mesLabels.map(m=>`<div style="flex:1;font-size:8px;color:var(--dim);text-align:center;letter-spacing:.5px">${m}</div>`).join('')}
        </div>
        ${ganttRows}
        <div style="margin-top:8px;font-size:9px;color:var(--dim)">↗ clique no projeto para abrir etapas</div>
      </div>
      <div style="flex:1;padding:12px 14px">
        <div style="font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);margin-bottom:8px;font-weight:600">Capacidade · 3 sem.</div>
        ${capHeader}${capRows}
        <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:10px">
          <div style="display:flex;gap:4px;align-items:center"><div style="width:8px;height:8px;background:#1a6a50"></div><span style="font-size:8px;color:var(--dim)">Normal</span></div>
          <div style="display:flex;gap:4px;align-items:center"><div style="width:8px;height:8px;background:var(--yellow)"></div><span style="font-size:8px;color:var(--dim)">Alta</span></div>
          <div style="display:flex;gap:4px;align-items:center"><div style="width:8px;height:8px;background:var(--red)"></div><span style="font-size:8px;color:var(--dim)">Crítica</span></div>
        </div>
        <div style="margin-top:8px;font-size:9px;color:var(--dim)">↗ clique na semana para detalhar</div>
      </div>
    </div>
  </div>`;

  // Capacidade drill-down se semana selecionada
  if(S.semSel!=null&&tl.sem[S.semSel]){
    const selData=tl.sem[S.semSel];
    const wEnd=aw(selData,1);const wEndD=new Date(wEnd);wEndD.setDate(wEndD.getDate()-1);
    out+=`<div class="wk-detail" style="margin-bottom:12px">
      <div class="wk-header">
        <button class="wk-nav" data-semsel="${Math.max(0,S.semSel-1)}">‹</button>
        <div class="wk-title">Semana ${fmtFull(selData)} — ${fmtFull(wEndD)}</div>
        <button class="wk-nav" data-semsel="${Math.min(tl.sem.length-1,S.semSel+1)}">›</button>
        <button class="btn-ghost" data-semsel="-1">✕ fechar</button>
      </div>`;
    c.forEach(p=>{
      const s=p.linha[S.semSel];if(!s)return;
      const pct=Math.min(s.oc,1);
      out+=`<div class="person-row">
        <div class="person-label"><span>${esc(p.pessoa)}</span><span style="color:${sinal(s.oc)};font-weight:700">${Math.round(s.al)}h / ${s.disp}h · ${Math.round(s.oc*100)}%</span></div>
        <div class="occ-bar"><div class="occ-fill" style="width:${pct*100}%;background:${sinal(s.oc)}"></div></div>`;
      if(s.ativs.length){
        out+=`<div class="ativ-list">`;
        s.ativs.forEach(a=>{out+=`<div class="ativ-chip"><span class="proj-dot" style="background:${corN(a.n)}"></span><span>${esc(entOf(a.n))}</span><span class="ac-proj">${esc(a.projeto)}</span><span class="ac-h">${a.hSem}h</span></div>`;});
        out+=`</div>`;
      }else{out+=`<div style="font-size:10px;color:var(--dim);padding:4px 0;letter-spacing:.5px">Sem atividades alocadas</div>`;}
      out+=`</div>`;
    });
    out+=`</div>`;
  }

  // ── RESUMO FINANCEIRO (só diretor) ──
  if(isDir){
    const vc=S.projs.filter(p=>p.status==='Ativo').reduce((s,p)=>s+(+(p.valorContratado||0)),0);
    const vprop=S.projs.filter(p=>p.status==='Proposta').reduce((s,p)=>s+(+(p.valorContratado||0)),0);
    const margens=S.projs.filter(p=>p.status==='Ativo').map(p=>margemReal(p.nome)).filter(m=>m!=null);
    const margMedia=margens.length?margens.reduce((s,m)=>s+m,0)/margens.length:null;
    const custoTotal=S.projs.filter(p=>p.status==='Ativo').reduce((s,p)=>s+custoEstimado(p.nome),0);
    const margPct=vc>0&&custoTotal<vc?Math.round((vc-custoTotal)/vc*100):null;
    out+=`<div style="border:1px solid var(--line);border-radius:0;margin-bottom:12px">
      <div style="display:flex;align-items:center;gap:8px;padding:9px 14px;background:var(--panel2)">
        <span style="font-size:9px;letter-spacing:2px;text-transform:uppercase;font-weight:700;color:var(--dim)">Resumo financeiro</span>
        <span style="font-size:9px;background:#2a1a10;color:var(--accent);padding:1px 7px;letter-spacing:1px;text-transform:uppercase">Diretor</span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid var(--line)">
        <div style="padding:12px 14px;border-right:1px solid var(--line)">
          <div style="font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);margin-bottom:4px;font-weight:600">Receita contratada</div>
          <div style="font-size:20px;font-weight:700;color:var(--green)">${fmtBRL(vc)}</div>
          <div style="font-size:10px;color:var(--dim);margin-top:3px">${S.projs.filter(p=>p.status==='Ativo').length} projeto${S.projs.filter(p=>p.status==='Ativo').length!==1?'s ativos':'ativo'}</div>
        </div>
        <div style="padding:12px 14px;border-right:1px solid var(--line)">
          <div style="font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);margin-bottom:4px;font-weight:600">Em negociação</div>
          <div style="font-size:20px;font-weight:700;color:var(--yellow)">${fmtBRL(vprop)}</div>
          <div style="font-size:10px;color:var(--dim);margin-top:3px">${S.projs.filter(p=>p.status==='Proposta').length} proposta${S.projs.filter(p=>p.status==='Proposta').length!==1?'s':''}</div>
        </div>
        <div style="padding:12px 14px">
          <div style="font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);margin-bottom:4px;font-weight:600">Margem estimada</div>
          <div style="font-size:20px;font-weight:700;color:${margPct!=null&&margPct>=0?'var(--accent)':'var(--red)'}">${margPct!=null?margPct+'%':'—'}</div>
          <div style="font-size:10px;color:var(--dim);margin-top:3px">custo est. ${fmtBRL(custoTotal)}</div>
        </div>
      </div>
    </div>`;
  }

  // ── MINHAS ATIVIDADES ──
  if(minhasAtiv.length){
    const proxMinha=minhasAtiv.sort((a,b)=>{if(!a.fim)return 1;if(!b.fim)return -1;return D(a.fim)-D(b.fim);}).slice(0,5);
    out+=`<div style="border:1px solid var(--line);border-radius:0;margin-bottom:12px">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:9px 14px;background:var(--panel2)">
        <span style="font-size:9px;letter-spacing:2px;text-transform:uppercase;font-weight:700;color:var(--dim)">Minhas atividades</span>
        <span style="font-size:10px;background:var(--panel);color:var(--dim);padding:1px 7px">próximos 7 dias</span>
      </div>`;
    proxMinha.forEach(a=>{
      const isActive=S.timer?.ativId===a.id;
      const atr=isAtrasada(a);
      out+=`<div style="display:flex;align-items:center;gap:8px;padding:10px 14px;background:${isActive?'rgba(166,83,58,.15)':'var(--bg)'};border-top:1px solid var(--line)">
        <div class="dot" style="background:${SCOR[a.status]};flex-shrink:0"></div>
        <div style="flex:1;min-width:0">
          <div style="font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px">${esc(entOf(a.n))}</div>
          <div style="display:flex;gap:5px;flex-wrap:wrap">
            <span style="font-size:12px;font-weight:600;background:var(--panel2);color:${corN(a.n)};padding:2px 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px">${esc(a.projeto)}</span>
            ${a.fim?`<span style="font-size:12px;font-weight:600;background:${atr?'#3A1A14':'var(--panel2)'};color:${atr?'var(--red)':'var(--warm)'};padding:2px 8px;white-space:nowrap">${atr?'⚠ ':''}${fmt(D(a.fim))}</span>`:''}
          </div>
        </div>
        ${isActive
          ?`<button class="timer-btn timer-stop" data-act="stopTimer">■ Parar</button>`
          :`<button class="timer-btn timer-start" data-start-timer="${a.id}" title="${S.timer?"Trocar para esta atividade":"Iniciar"}">${S.timer?"⇄":"▶"}</button>`
        }
      </div>`;
    });
    out+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 14px;border-top:1px solid var(--line)">
      <span style="font-size:9px;color:var(--dim)">Horas registradas hoje</span>
      <span style="font-size:13px;font-weight:600">${Math.round(horasHoje*10)/10}h</span>
    </div></div>`;
  }else{
    out+=`<div class="empty"><div class="empty-title">Sem atividades atribuídas</div><div class="muted">Peça ao diretor para atribuir atividades a você.</div></div>`;
  }

  return out;
}

function vMinhas(){
  const pessoa=S.usuario?.pessoa||'';
  const h=today();
  const minha=S.ativ.filter(a=>a.resp===pessoa&&a.status!=='Cancelada').sort((a,b)=>{
    if(a.status==='Concluída'&&b.status!=='Concluída')return 1;
    if(b.status==='Concluída'&&a.status!=='Concluída')return -1;
    if(!a.fim)return 1;if(!b.fim)return -1;return D(a.fim)-D(b.fim);
  });
  const minhasEntradas=S.timeEntries.filter(e=>e.pessoa===pessoa);
  const horasHoje=minhasEntradas.filter(e=>{const d=new Date(e.fim||e.inicio);return d>=h;}).reduce((s,e)=>s+(e.horas||0),0);
  const horasTotal=minhasEntradas.reduce((s,e)=>s+(e.horas||0),0);

  let out=`<div class="cards" style="margin-bottom:12px">
    <div class="mcard"><div class="lb">Hoje</div><div class="vl">${Math.round(horasHoje*10)/10}h</div></div>
    <div class="mcard"><div class="lb">Total registrado</div><div class="vl">${Math.round(horasTotal*10)/10}h</div></div>
    <div class="mcard"><div class="lb">Pendentes</div><div class="vl">${minha.filter(a=>a.status!=='Concluída').length}</div></div>
  </div>`;

  if(!minha.length)return out+`<div class="empty"><div class="empty-title">Sem atividades</div></div>`;

  // Agrupadas por projeto
  const projs=[...new Set(minha.map(a=>a.projeto))];
  projs.forEach(proj=>{
    const as=minha.filter(a=>a.projeto===proj);
    out+=`<div class="sec-title" style="margin-top:16px">${esc(proj)}</div>`;
    as.forEach(a=>{
      const isActive=S.timer?.ativId===a.id;
      const hReg=minhasEntradas.filter(e=>e.ativId===a.id).reduce((s,e)=>s+(e.horas||0),0);
      out+=`<div style="display:flex;align-items:center;gap:8px;padding:10px 14px;background:${isActive?'rgba(166,83,58,.2)':'var(--panel)'};border-bottom:1px solid var(--line)">
        <div class="dot" style="background:${SCOR[a.status]}"></div>
        <div style="flex:1;min-width:0">

        }
      </div>`;
    });
  });

  // Registros de hoje
  const hoje=minhasEntradas.filter(e=>{const d=new Date(e.fim||e.inicio);return d>=h;}).slice().reverse();
  if(hoje.length){
    out+=`<div class="sec-title" style="margin-top:24px">Registros de hoje</div>`;

      const a=S.ativ.find(x=>x.id===e.ativId);

      out+=`<div style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--panel);border-bottom:1px solid var(--line);font-size:10px">

}

function vCapMini(){
  const c=cap();const tl=timeline();const sem=tl.sem.slice(0,16);

  let h=`<div class="sec-title">Capacidade — próximas semanas</div>
  <div style="overflow-x:auto;margin-bottom:${selData?'0':'20px'}"><div style="min-width:${sem.length*30+115}px">
  <div style="display:flex;padding-left:115px;margin-bottom:4px">${sem.map((s,i)=>`<button data-semsel="${i}" style="width:28px;background:none;border:none;padding:0;cursor:pointer;font-family:inherit"><div style="font-size:8px;color:${selIdx===i?'var(--accent)':'var(--dim)'};text-align:center;letter-spacing:.5px;font-weight:${selIdx===i?'700':'400'}">${fmt(s).split(" ")[0]}</div></button>`).join("")}</div>`;
  c.forEach(p=>{h+=`<div style="display:flex;align-items:center;margin-bottom:3px"><div style="width:115px;font-size:11px;font-weight:600;letter-spacing:.5px;color:var(--txt)">${esc(p.pessoa)}<span style="font-size:9px;color:var(--dim);font-weight:400;letter-spacing:0"> ${p.disp}h</span></div>`+
  p.linha.slice(0,16).map((s,i)=>`<button data-semsel="${i}" style="width:26px;height:26px;margin:1px;background:${selIdx===i?'transparent':sinal(s.oc)};border:${selIdx===i?'2px solid var(--accent)':'1px solid transparent'};display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:${sinalTxt(s.oc)};cursor:pointer;font-family:inherit" title="${Math.round(s.al)}h/${s.disp}h">${s.oc>0?Math.round(s.oc*100):""}</button>`).join("")+`</div>`;});
  h+=`</div></div>`;
  if(selData!==null){
    const wEnd=aw(selData,1);const wEndD=new Date(wEnd);wEndD.setDate(wEndD.getDate()-1);

    h+=`<button class="wk-nav" data-semsel="${Math.max(0,selIdx-1)}">‹</button>`;
    h+=`<div class="wk-title">Semana ${fmtFull(selData)} — ${fmtFull(wEndD)}</div>`;
    h+=`<button class="wk-nav" data-semsel="${Math.min(sem.length-1,selIdx+1)}">›</button>`;
    h+=`<button class="btn-ghost" data-semsel="-1">✕ fechar</button>`;
    h+=`</div>`;
    c.forEach(p=>{
      const s=p.linha[selIdx];if(!s)return;
      const pct=Math.min(s.oc,1);
      h+=`<div class="person-row">`;
      h+=`<div class="person-label"><span>${esc(p.pessoa)}</span><span style="color:${sinal(s.oc)};font-weight:700">${Math.round(s.al)}h / ${s.disp}h · ${Math.round(s.oc*100)}%</span></div>`;
      h+=`<div class="occ-bar"><div class="occ-fill" style="width:${pct*100}%;background:${sinal(s.oc)}"></div></div>`;
      if(s.ativs.length){
        h+=`<div class="ativ-list">`;
        s.ativs.forEach(a=>{h+=`<div class="ativ-chip"><span class="proj-dot" style="background:${corN(a.n)}"></span><span>${esc(entOf(a.n))}</span><span class="ac-proj">${esc(a.projeto)}</span><span class="ac-h">${a.hSem}h</span></div>`;});

function vResumoProjetos(){
  const ativos=S.projs.filter(p=>p.status!=="Concluído").map(p=>p.nome).filter(nm=>S.ativ.some(a=>a.projeto===nm&&a.ini&&a.fim));
  const semProj=[...new Set(S.ativ.filter(a=>a.ini&&a.fim).map(a=>a.projeto))].filter(nm=>!ativos.includes(nm));
  const all=[...ativos,...semProj];
  if(!all.length)return "";
  const tl=timeline();const px=d=>d/tl.tot*100;
  let h=`<div class="sec-title" style="margin-top:8px">Cronograma por projeto</div>
  <div style="background:var(--panel);border:1px solid var(--line);overflow:auto;margin-bottom:24px"><div style="min-width:600px">
  <div class="gbar" style="padding-left:120px">${tl.sem.map((s,i)=>`<div style="flex:1;font-size:8px;color:var(--dim);padding:6px 2px;text-align:center;letter-spacing:.5px;${i?"border-left:1px solid var(--line)":""}">${fmt(s)}</div>`).join("")}</div>`;
  all.forEach(nm=>{
    const segs=S.ativ.filter(a=>a.projeto===nm&&a.ini&&a.fim&&a.status!=="Cancelada");
    if(!segs.length)return;
    let mn=D(segs[0].ini),mx=D(segs[0].fim);
    segs.forEach(a=>{if(D(a.ini)<mn)mn=D(a.ini);if(D(a.fim)>mx)mx=D(a.fim);});
    const off=px(dd(tl.min,mn)),w=Math.max(px(dd(mn,mx)+1),2);
    const span=dd(mn,mx)+1;
    h+=`<button data-open="${esc(nm)}" class="barrow" style="width:100%;background:none;border:none;text-align:left;cursor:pointer">
    <div style="width:120px;padding:0 8px 0 14px;font-size:10px;font-weight:700;letter-spacing:.5px;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(nm)}</div>
    <div style="flex:1;position:relative;min-height:36px"><div style="position:absolute;left:${off}%;width:${w}%;top:9px;height:18px;overflow:hidden;display:flex">`;
    BLOCOS.forEach(bl=>{
      const inb=segs.filter(a=>blocoOf(a.n)===bl);if(!inb.length)return;
      let bmn=D(inb[0].ini),bmx=D(inb[0].fim);
      inb.forEach(a=>{if(D(a.ini)<bmn)bmn=D(a.ini);if(D(a.fim)>bmx)bmx=D(a.fim);});
      const segw=(dd(bmn,bmx)+1)/span*100;
      h+=`<div title="${bl}" style="width:${segw}%;background:${BCOR[bl.slice(0,2)]};border-right:1px solid rgba(255,255,255,.3)"></div>`;
    });
    h+=`</div></div></button>`;
  });
  return h+`</div></div>`;
}

function vProjCronograma(as){
  const dts=as.filter(a=>a.ini&&a.fim&&a.status!=="Cancelada");
  if(!dts.length)return `<div class="muted" style="margin-bottom:14px">Sem atividades com datas ainda — defina o período das atividades para ver o cronograma deste projeto.</div>`;
  let mn=D(dts[0].ini),mx=D(dts[0].fim);
  dts.forEach(a=>{if(D(a.ini)<mn)mn=D(a.ini);if(D(a.fim)>mx)mx=D(a.fim);});
  const m0=mon(mn),n=Math.max(4,wspan(mn,mx)+1);
  const sem=[...Array(n)].map((_,i)=>aw(m0,i));
  const tot=Math.max(1,dd(m0,aw(m0,n-1))+1);
  const px=d=>d/tot*100;
  const todayOff=px(dd(m0,today()));
  const groups=BLOCOS.map(b=>({b,it:dts.filter(a=>blocoOf(a.n)===b)})).filter(g=>g.it.length);
  let h=`<div class="sec-title">Cronograma deste projeto</div>
  <div style="background:var(--panel);border:1px solid var(--line);overflow:auto;margin-bottom:16px"><div style="min-width:600px;position:relative">
  <div class="gbar" style="padding-left:140px">${sem.map((s,i)=>`<div style="flex:1;font-size:8px;color:var(--dim);padding:6px 2px;text-align:center;letter-spacing:.5px;${i?"border-left:1px solid var(--line)":""}">${fmt(s)}</div>`).join("")}</div>`;
  groups.forEach(g=>{
    let gmn=D(g.it[0].ini),gmx=D(g.it[0].fim);
    g.it.forEach(a=>{if(D(a.ini)<gmn)gmn=D(a.ini);if(D(a.fim)>gmx)gmx=D(a.fim);});
    const off=px(dd(m0,gmn)),w=Math.max(px(dd(gmn,gmx)+1),2);
    const marcos=g.it.filter(a=>isMarco(a.n));
    h+=`<div style="display:flex;align-items:center;min-height:34px;border-top:1px solid var(--line)">
      <div style="width:140px;padding:0 8px 0 14px;font-size:9px;font-weight:700;color:${corN(g.it[0].n)};white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${g.b}">${g.b}</div>
      <div style="flex:1;position:relative;min-height:34px">
        <div style="position:absolute;left:${off}%;width:${w}%;top:8px;height:18px;background:${corN(g.it[0].n)};opacity:.85;border-radius:2px"></div>
        ${marcos.map(a=>{const mo=px(dd(m0,D(a.fim)));return `<div title="${esc(valOf(a.n))} · ${fmt(D(a.fim))}" style="position:absolute;left:calc(${mo}% - 5px);top:2px;width:10px;height:10px;background:var(--accent2);border:1px solid var(--txt);transform:rotate(45deg)"></div>`;}).join("")}
      </div>
    </div>`;
  });
  if(todayOff>=0&&todayOff<=100)h+=`<div style="position:absolute;left:calc(140px + ${todayOff}%);top:0;bottom:0;width:1px;background:var(--accent);opacity:.8;pointer-events:none;z-index:5"></div>`;
  return h+`</div></div>`;
}

  let h=`<div class="row" style="margin-bottom:16px;flex-wrap:wrap;gap:8px">
    <label style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--dim);letter-spacing:.5px;cursor:pointer"><input type="checkbox" id="vo" ${S.verOper?"checked":""}/> Mostrar operacionais</label>
    <button class="btnP" data-act="newproj">+ Novo Projeto</button>
  </div>
  <div style="background:var(--panel);border:1px solid var(--line);overflow:auto"><div style="min-width:680px;position:relative">
  <div class="gbar" style="padding-left:150px">${tl.sem.map((s,i)=>`<div style="flex:1;font-size:8px;color:var(--dim);padding:7px 2px;text-align:center;letter-spacing:.5px;${i?"border-left:1px solid var(--line)":""}">${fmt(s)}</div>`).join("")}</div>`;
  projs.forEach(pr=>{
    h+=`<button data-open="${esc(pr)}" class="g-proj-hd">${esc(pr)} ›</button>`;

      const has=a.ini&&a.fim;
      const off=has?px(dd(tl.min,D(a.ini))):0;
      const w=has?Math.max(px(dd(D(a.ini),D(a.fim))+1),2.5):0;
      const atr=isAtrasada(a);
      h+=`<div class="barrow" style="${atr?"background:#FDF5F5":""}">
        <div style="width:150px;padding:0 8px 0 14px;font-size:10px;overflow:hidden">
          <div style="font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.3px">${atr?"⚠ ":""}${esc(entOf(a.n))}</div>
          <div style="font-size:9px;color:var(--dim);letter-spacing:.3px">#${a.n} · ${esc(a.resp)}</div>
        </div>
        <div style="flex:1;position:relative;min-height:40px">`+
      (has?`<button data-edit="${a.id}" style="position:absolute;left:${off}%;width:${w}%;top:8px;height:24px;background:${atr?"#A03030":corN(a.n)};border:none;opacity:${a.status==="Cancelada"?.4:1};color:#fff;font-size:9px;font-weight:700;overflow:hidden;white-space:nowrap;padding:0 6px;display:flex;align-items:center;gap:4px;letter-spacing:.5px"><div style="width:4px;height:4px;background:${SCOR[a.status]};flex-shrink:0"></div>${a.horas}h</button>`
      :`<button data-edit="${a.id}" style="position:absolute;left:8px;top:8px;height:24px;padding:0 12px;background:transparent;border:1px solid var(--line);color:var(--dim);font-size:9px;letter-spacing:1px;text-transform:uppercase;font-family:inherit">Definir datas</button>`)+
      `</div></div>`;
    });
  });
  if(todayOff>=0&&todayOff<=100){
    h+=`<div style="position:absolute;left:calc(150px + ${todayOff}%);top:0;bottom:0;width:1px;background:var(--accent);opacity:.8;pointer-events:none;z-index:5"></div>`;
  }
  return h+`</div></div>`;
}

function workingDays(start,end){
  let count=0;const d=new Date(start);const e2=new Date(end);
  while(d<=e2){if(d.getDay()!==0&&d.getDay()!==6)count++;d.setDate(d.getDate()+1);}
  return count;
}

function vCap(){
  if(S.capView==="dia"&&S.capSemDia!=null)return vCapDia();
  return vCapSem();
}

function vCapSem(){
  const c=cap();const tl=timeline();
  return `<div class="sec-title" style="margin-bottom:12px">Capacidade semanal · toque para ver dia a dia · Verde ok · Amarelo ≥85% · Vermelho estourado</div>
  <div style="overflow-x:auto"><div style="min-width:${tl.sem.length*40+140}px">
  <div style="display:flex;padding-left:140px;margin-bottom:6px">${tl.sem.map((s,i)=>`<button data-cap-drill="${i}" style="width:40px;font-size:8px;color:var(--dim);text-align:center;letter-spacing:.5px;background:none;border:none;cursor:pointer;padding:2px 0;font-family:inherit" title="Ver semana ${fmt(s)} dia a dia">${fmt(s).split(" ")[0]}</button>`).join("")}</div>`+
  c.map(p=>`<div style="display:flex;align-items:center;margin-bottom:4px">
    <div style="width:140px;font-size:11px;font-weight:600;letter-spacing:.5px">${esc(p.pessoa)}<div style="font-size:9px;color:var(--dim);font-weight:400;letter-spacing:0">${p.disp}h/sem</div></div>`+
  p.linha.map((s,i)=>`<button data-cap-drill="${i}" class="heat" style="background:${sinal(s.oc)};color:${sinalTxt(s.oc)};border:none;cursor:pointer;font-family:inherit" title="${Math.round(s.al)}h / ${s.disp}h · toque para detalhar">${s.oc>0?Math.round(s.oc*100):""}</button>`).join("")+
  `</div>`).join("")+
  `</div></div>`;
}

function vCapDia(){
  const tl=timeline();
  const sem=tl.sem;
  if(!sem[S.capSemDia])return vCapSem();
  const semStart=sem[S.capSemDia];
  const nomes=["Seg","Ter","Qua","Qui","Sex"];
  const datas=[0,1,2,3,4].map(i=>{const d=new Date(semStart);d.setDate(d.getDate()+i);return d;});
  const wEnd=datas[4];

  // Calcula horas por dia por pessoa
  const dayData=S.equipe.map(e=>{
    const days=datas.map(dia=>{
      let h=0;const ativs=[];
      S.ativ.filter(a=>a.resp===e.pessoa&&a.status!=="Cancelada"&&a.ini&&a.fim).forEach(a=>{
        const ai=D(a.ini),af=D(a.fim);
        const wd=workingDays(ai,af)||1;
        const hpd=a.horas/wd;
        const dow=dia.getDay();
        if(dow!==0&&dow!==6&&dia>=ai&&dia<=af){h+=hpd;ativs.push({...a,hDay:Math.round(hpd*10)/10});}
      });
      const oc=e.hd?h/e.hd:0;
      return{h:Math.round(h*10)/10,oc,ativs};
    });
    return{pessoa:e.pessoa,disp:e.hd,days};
  });

  // Semanas anterior/próxima
  const prev=S.capSemDia>0?`<button class="wk-nav" data-cap-drill="${S.capSemDia-1}">‹</button>`:"";
  const next=S.capSemDia<sem.length-1?`<button class="wk-nav" data-cap-drill="${S.capSemDia+1}">›</button>`:"";

  let h=`<div class="cap-drill-back">
    <button class="btn" data-cap-back="1">‹ Semanal</button>
    ${prev}<div style="font-size:11px;letter-spacing:1px;text-transform:uppercase;font-weight:600">${fmtFull(semStart)} — ${fmtFull(wEnd)}</div>${next}
  </div>
  <div style="background:var(--panel);border:1px solid var(--line);border-top:2px solid var(--accent);padding:16px 20px">`;

  // Cabeçalho dos dias
  h+=`<div style="display:grid;grid-template-columns:100px repeat(5,1fr);gap:6px;margin-bottom:16px">
    <div></div>
    ${nomes.map((n,i)=>`<div style="text-align:center">
      <div class="cap-day-name">${n}</div>
      <div class="cap-day-date">${datas[i].getDate()}/${datas[i].getMonth()+1}</div>
    </div>`).join("")}
  </div>`;

  // Barras por pessoa
  dayData.forEach(p=>{
    const maxH=p.disp||8;
    h+=`<div style="display:grid;grid-template-columns:100px repeat(5,1fr);gap:6px;margin-bottom:16px;align-items:end">
      <div style="padding-bottom:8px">
        <div style="font-size:11px;font-weight:600;letter-spacing:.5px">${esc(p.pessoa)}</div>
        <div style="font-size:8px;color:var(--dim)">${p.disp}h/dia</div>
      </div>
      ${p.days.map(day=>{
        const pct=Math.min(day.oc,1)*100;
        return`<div style="text-align:center">
          <div style="font-size:9px;font-weight:700;color:${day.h>0?sinal(day.oc):'var(--dim)'};margin-bottom:4px;min-height:14px">${day.h>0?day.h+'h':''}</div>
          <div style="height:50px;background:var(--panel2);display:flex;align-items:flex-end;margin:0 2px;position:relative">
            <div style="width:100%;height:${pct}%;background:${sinal(day.oc)};min-height:${day.h>0?2:0}px;transition:height .2s"></div>
            ${day.oc>1?`<div style="position:absolute;top:0;left:0;right:0;bottom:0;border:2px solid var(--red);pointer-events:none"></div>`:''}
          </div>
          <div style="font-size:8px;color:var(--dim);margin-top:3px;min-height:12px">${day.h>0?Math.round(day.oc*100)+'%':''}</div>
          ${day.ativs.length?`<div style="font-size:7px;color:var(--dim);margin-top:2px;letter-spacing:.3px">${day.ativs.slice(0,2).map(a=>esc(entOf(a.n).slice(0,10))).join('<br/>')}</div>`:''}
        </div>`;
      }).join("")}
    </div>`;
  });

  h+=`</div>`;
  return h;
}

    <div class="sec-title" style="margin:0;border:none;padding:0">Equipe</div>

      <div style="text-align:right">
