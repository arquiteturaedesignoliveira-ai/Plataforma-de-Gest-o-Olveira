function vParametrosTab(){
  if(finGateLocked())return vFinSenha();
  return vEquipe()+`<div style="margin-top:18px"></div>`+vFinParametros();
}

/* ── COMERCIAL ── */
function finGateLocked(){
  const isDir=S.usuario?.role==="diretor";
  if(isDir)return !!(S.fin.senha&&!S.finUnlocked);
  return !S.fin.senhaFin||!S.finUnlocked;
}
function vComercial(){
  if(finGateLocked())return vFinSenha();
  const tabs=[["dashboard","Dashboard"],["propostas","Controle de propostas"]];
  const subTabs=`<div class="fin-tabs">${tabs.map(([k,l])=>`<button class="fin-tab ${(S.comTab||"dashboard")===k?"on":""}" data-com-tab="${k}">${l}</button>`).join("")}</div>`;
  if((S.comTab||"dashboard")==="propostas") return subTabs+vFinComercial();
  return subTabs+vFinDashboard();
}

/* ── FINANCEIRO ── */
function vFinanceiro(){
  if(finGateLocked())return vFinSenha();
  const tabs=[["entradas","Entradas"],["projetos","Honorários"]];
  if(!["entradas","projetos"].includes(S.finTab))S.finTab="entradas";
  const subTabs=`<div class="fin-tabs">${tabs.map(([k,l])=>`<button class="fin-tab ${S.finTab===k?"on":""}" data-fin-tab="${k}">${l}</button>`).join("")}</div>`;
  if(S.finTab==="entradas") return subTabs+vFinEntradas();
  return subTabs+vFinProjetos();
}

function vFinEntradas(){
  const cts=S.fin.contratos||[];
  const ano=S.entAno||new Date().getFullYear();
  const h0=today();
  const meses=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
  const allP=[];cts.forEach(ct=>(ct.parcelas||[]).forEach(p=>allP.push({...p,ctId:ct.id})));
  const noAno=allP.filter(p=>p.data&&+p.data.slice(0,4)===ano);
  const prev=noAno.reduce((s,p)=>s+p.valor,0);
  const rec=noAno.filter(p=>p.pago).reduce((s,p)=>s+p.valor,0);
  const atraso=allP.filter(p=>!p.pago&&p.data&&D(p.data)<h0).reduce((s,p)=>s+p.valor,0);
  const pct=prev?Math.round(rec/prev*100):0;
  const kk=v=>v>=1000?"R$ "+(Math.round(v/100)/10).toLocaleString("pt-BR")+"k":fmtBRL(v);

  let h=`<div class="row" style="margin-bottom:14px;flex-wrap:wrap;gap:8px">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="sec-title" style="margin:0;border:none;padding:0">Planejamento de entradas</div>
      <button class="btn" data-entano="${ano-1}" style="padding:4px 10px">‹</button>
      <span style="font-size:14px;font-weight:700">${ano}</span>
      <button class="btn" data-entano="${ano+1}" style="padding:4px 10px">›</button>
    </div>
    <button class="btnP" data-act="newctr">+ Novo contrato</button>
  </div>`;

  h+=`<div style="display:flex;align-items:center;border-bottom:1px solid var(--line);margin-bottom:16px;flex-wrap:wrap">
    ${[[kk(prev),"Previsto "+ano,"var(--txt)"],[kk(rec),"Recebido · "+pct+"%","var(--green)"],[kk(atraso),"Em atraso",atraso?"var(--red)":"var(--dim)"],[cts.length,"Contratos","var(--blue)"]].map(([v,l,c],i)=>`
    <div style="display:flex;align-items:baseline;gap:7px;padding:8px 16px 8px ${i?'16px':'0'};${i?'border-left:1px solid var(--line);':''}">
      <div style="font-size:22px;font-weight:700;color:${c};line-height:1">${v}</div>
      <div style="font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);font-weight:600;white-space:nowrap">${l}</div>
    </div>`).join("")}
  </div>`;

  // Barras recebido × previsto
  const mPrev=meses.map((_,m)=>noAno.filter(p=>+p.data.slice(5,7)===m+1&&!p.pago).reduce((s,p)=>s+p.valor,0));
  const mRec=meses.map((_,m)=>noAno.filter(p=>+p.data.slice(5,7)===m+1&&p.pago).reduce((s,p)=>s+p.valor,0));
  const mMax=Math.max(...mPrev.map((v,i)=>v+mRec[i]),1);
  h+=`<div class="sec-title">Recebido × previsto por mês</div>
  <div style="display:flex;align-items:flex-end;gap:4px;height:110px;padding:8px 0;border-bottom:1px solid var(--line)">
    ${meses.map((_,m)=>{
      const hr=Math.round(mRec[m]/mMax*90),hp=Math.round(mPrev[m]/mMax*90);
      return `<div style="flex:1;display:flex;flex-direction:column;justify-content:flex-end;gap:1px" title="${meses[m]}: recebido ${fmtBRL(mRec[m])} · previsto ${fmtBRL(mPrev[m])}">
        ${hp?`<div style="height:${Math.max(hp,2)}px;background:#1a4a3a"></div>`:""}
        ${hr?`<div style="height:${Math.max(hr,2)}px;background:var(--green)"></div>`:""}
      </div>`;
    }).join("")}
  </div>
  <div style="display:flex;gap:4px;margin-bottom:4px">
    ${meses.map(m=>`<div style="flex:1;font-size:7px;color:var(--dim);text-align:center;text-transform:uppercase;letter-spacing:.5px">${m}</div>`).join("")}
  </div>
  <div style="display:flex;gap:12px;margin-bottom:16px;font-size:9px;color:var(--dim)">
    <span><span style="display:inline-block;width:9px;height:9px;background:var(--green);vertical-align:-1px"></span> recebido</span>
    <span><span style="display:inline-block;width:9px;height:9px;background:#1a4a3a;vertical-align:-1px"></span> a receber</span>
  </div>`;

  // Grade 12 meses
  h+=`<div class="sec-title">Grade dos 12 meses</div>
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:6px;margin-bottom:20px">
    ${meses.map((nm,m)=>{
      const ps=noAno.filter(p=>+p.data.slice(5,7)===m+1);
      const tot=ps.reduce((s,p)=>s+p.valor,0);
      const pg=ps.filter(p=>p.pago).reduce((s,p)=>s+p.valor,0);
      const late=ps.some(p=>!p.pago&&D(p.data)<h0);
      const cor=!ps.length?"var(--line)":late?"var(--red)":pg>=tot?"var(--green)":pg>0?"var(--yellow)":"var(--line)";
      const sub=!ps.length?"—":late?fmtBRL(tot-pg).replace(",00","")+" pendente":pg>=tot?"100% recebido":pg>0?fmtBRL(pg).replace(",00","")+" de "+fmtBRL(tot).replace(",00",""):ps.length+" parcela"+(ps.length>1?"s":"");
      return `<div style="background:var(--panel);padding:8px;text-align:center;border-top:2px solid ${cor}">
        <div style="font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);font-weight:700">${nm}</div>
        <div style="font-size:12px;font-weight:700;margin-top:3px">${tot?kk(tot):"—"}</div>
        <div style="font-size:8px;color:var(--dim);margin-top:2px">${sub}</div>
      </div>`;
    }).join("")}
  </div>`;

  // Contratos
  h+=`<div class="sec-title">Contratos</div>`;
  if(!cts.length)return h+`<div class="empty"><div class="empty-title">Nenhum contrato cadastrado</div><div class="muted" style="margin-bottom:16px">Cadastre o contrato com a estrutura de pagamento — as parcelas alimentam a visão anual.</div><button class="btnP" data-act="newctr">+ Novo contrato</button></div>`;
  cts.slice().reverse().forEach(ct=>{
    const ps=ct.parcelas||[];
    const tot=ps.reduce((s,p)=>s+p.valor,0)||+ct.valorTotal||0;
    const pg=ps.filter(p=>p.pago).reduce((s,p)=>s+p.valor,0);
    const pctC=tot?Math.round(pg/tot*100):0;
    const imp=(+ct.impostos||0)/100;
    const liq=(+ct.valorTotal||0)*(1-imp)-(+ct.outrosCustos||0);
    const tipoTag=ct.tipo==="Interiores"?["INT","#2a1a35","#c77dff"]:ct.tipo==="Projeto Arquitetônico"?["ARQ","#0d2a40","var(--blue)"]:["ARQ+INT","#0a2e25","var(--green)"];
    const aberto=S.ctrOpen===ct.id;
    h+=`<div style="background:var(--panel);border-bottom:1px solid var(--line);padding:12px 14px">
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <span class="pill" style="background:${tipoTag[1]};color:${tipoTag[2]}">${tipoTag[0]}</span>
        <button data-ctr-open="${ct.id}" style="flex:1;min-width:0;background:none;border:none;text-align:left;cursor:pointer;font-family:inherit;color:var(--txt)">
          <div style="font-size:13px;font-weight:600">${esc(ct.nome)}</div>
          <div style="font-size:10px;color:var(--dim)">${esc(ct.cliente||"—")} · assinado ${ct.assinatura?new Date(ct.assinatura+"T12:00:00").toLocaleDateString("pt-BR"):"—"}${ct.projNome?" · "+esc(ct.projNome)+" ↗":""}</div>
        </button>
        <div style="text-align:right">
          <div style="font-size:13px;font-weight:700">${fmtBRL(+ct.valorTotal||0)}</div>
          <div style="font-size:9px;color:var(--dim)" title="após impostos ${ct.impostos||0}% e custos">líquido ${fmtBRL(liq)}</div>
        </div>
        <div style="display:flex;gap:6px">
          <button class="btn" style="font-size:9px;padding:4px 8px" data-genctr="${ct.id}">Gerar contrato</button>
          <button class="btn" style="font-size:9px;padding:4px 8px" data-editctr="${ct.id}">Editar</button>
          ${ct.aditivoDe?"":`<button class="btn" style="font-size:9px;padding:4px 8px;color:var(--yellow);border-color:var(--yellow)" data-aditivo="${ct.id}" title="Contrato adicional vinculado — para alteração de escopo/valor">+ Aditivo</button>`}
        </div>
      </div>
      <div style="height:4px;background:var(--panel2);margin-top:8px"><div style="height:100%;width:${pctC}%;background:var(--green)"></div></div>
      <div style="display:flex;justify-content:space-between;margin-top:5px;font-size:9px;color:var(--dim)">
        <span>${ct.entrada?"Entrada "+fmtBRL(+ct.entrada)+" + ":""}${ct.numParcelas||0}× ${fmtBRL(+ct.valorParcela||0)} (${ps.filter(p=>p.pago).length} de ${ps.length} pagas)</span>
        <span style="color:var(--green);font-weight:700">${fmtBRL(pg)} · ${pctC}%</span>
      </div>
      ${aberto?`<div style="margin-top:10px;border-top:1px solid var(--line)">
        ${ps.map(p=>{
          const late=!p.pago&&p.data&&D(p.data)<h0;
          const dias=late?Math.round((h0-D(p.data))/864e5):0;
          return `<button data-parc="${ct.id}|${p.id}" style="display:flex;align-items:center;gap:8px;width:100%;background:none;border:none;border-bottom:1px solid var(--line);padding:7px 4px;cursor:pointer;font-family:inherit;color:var(--txt);font-size:11px;text-align:left" title="clique para ${p.pago?"desmarcar":"marcar como paga"}">
            <div style="width:7px;height:7px;border-radius:50%;background:${p.pago?"var(--green)":late?"var(--red)":"var(--dim)"};flex-shrink:0"></div>
            <div style="flex:1">${esc(p.label)}${late?` <span style="color:var(--red);font-size:9px">· ${dias} dia${dias>1?"s":""} em atraso</span>`:""}</div>
            <div style="color:var(--dim);font-size:9px">${p.data?new Date(p.data+"T12:00:00").toLocaleDateString("pt-BR",{day:"2-digit",month:"short"}):"—"}</div>
            <div style="font-weight:700;color:${p.pago?"var(--green)":late?"var(--red)":"var(--txt)"}">${fmtBRL(p.valor)}${p.pago?" ✓":""}</div>
          </button>`;
        }).join("")}
        <div style="display:flex;justify-content:flex-end;padding:8px 4px">
          <button class="btn" style="font-size:9px;padding:4px 8px;color:var(--red);border-color:var(--red)" data-delctr="${ct.id}">Excluir contrato</button>
        </div>
      </div>`:""}
    </div>`;
  });
  return h;
}

function vFinDashboard(){
  const ps=S.fin.propostas||[];
  const total=ps.length;
  const aprov=ps.filter(p=>p.status==="Aprovado").length;
  const reprov=ps.filter(p=>p.status==="Reprovado").length;
  const negoc=ps.filter(p=>p.status==="Em negociação").length;
  const apresent=ps.filter(p=>p.status==="Apresentado").length;
  const encerradas=aprov+reprov;
  const conv=encerradas?Math.round(aprov/encerradas*100):0;
  const valAprov=ps.filter(p=>p.status==="Aprovado").reduce((s,p)=>s+(+(p.valorP1||0)),0);
  const valNegoc=ps.filter(p=>p.status==="Em negociação").reduce((s,p)=>s+(+(p.valorP1||0)),0);
  const ticket=aprov?Math.round(valAprov/aprov):0;

  // KPIs
  let h=`<div class="cards" style="margin-bottom:24px">
    ${[
      ["Total de propostas",total],
      ["Aprovadas",aprov],
      ["Em negociação",negoc],
      ["Taxa de conversão",conv+"%"],
      ["Ticket médio",ticket?fmtBRL(ticket):"—"],
      ["Receita aprovada",valAprov?fmtBRL(valAprov):"—"]
    ].map(([l,v])=>`<div class="mcard"><div class="lb">${l}</div><div class="vl" style="font-size:18px">${v}</div></div>`).join("")}
  </div>`;

  h+=`<div class="charts-grid">`;

  // Donut — status
  h+=`<div class="chart-box"><div class="chart-title">Propostas por status</div>`;
  if(!total){h+=`<div style="font-size:11px;color:var(--dim)">Nenhuma proposta ainda.</div>`;}
  else{
    const R=54,cx=70,cy=70,circ=2*Math.PI*R;
    let offset=0;
    const segs=PROP_STATUS.map(s=>({s,n:ps.filter(p=>p.status===s).length,c:PROP_COR[s]})).filter(x=>x.n>0);
    let svg=`<div style="display:flex;gap:20px;align-items:center;flex-wrap:wrap">
    <svg width="140" height="140" viewBox="0 0 140 140">
      <circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="var(--line)" stroke-width="18"/>`;
    segs.forEach(({s,n,c})=>{
      const len=circ*n/total;
      svg+=`<circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="${c}" stroke-width="18"
        stroke-dasharray="${len} ${circ-len}"
        stroke-dashoffset="${circ/4-offset}" transform="rotate(-90 ${cx} ${cy})">
        <title>${s}: ${n}</title></circle>`;
      offset+=len;
    });
    svg+=`<text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="middle" font-size="20" font-weight="300" fill="var(--txt)">${total}</text>
      <text x="${cx}" y="${cy+16}" text-anchor="middle" font-size="8" fill="var(--dim)" letter-spacing="1">TOTAL</text>
    </svg>`;
    svg+=`<div style="display:flex;flex-direction:column;gap:6px">`;
    segs.forEach(({s,n,c})=>{
      svg+=`<div style="display:flex;align-items:center;gap:7px;font-size:11px">
        <div style="width:8px;height:8px;background:${c};flex-shrink:0"></div>
        <span style="color:var(--dim)">${s}</span>
        <span style="font-weight:700;margin-left:auto;padding-left:12px">${n}</span>
      </div>`;
    });
    svg+=`</div></div>`;
    h+=svg;
  }
  h+=`</div>`;

  // Barras — propostas por mês (últimos 6)
  h+=`<div class="chart-box"><div class="chart-title">Propostas por mês</div>`;
  const meses=[];
  for(let i=5;i>=0;i--){const d=new Date();d.setMonth(d.getMonth()-i);meses.push({y:d.getFullYear(),m:d.getMonth(),lbl:d.toLocaleDateString("pt-BR",{month:"short"}).replace(".","")});}
  const counts=meses.map(({y,m})=>ps.filter(p=>{if(!p.data)return false;const d=new Date(p.data+"T12:00:00");return d.getFullYear()===y&&d.getMonth()===m;}).length);
  const maxC=Math.max(...counts,1);
  const bw=36,bGap=8,svgW=meses.length*(bw+bGap)+20,svgH=120;
  let bSvg=`<svg width="100%" viewBox="0 0 ${svgW} ${svgH+30}" style="overflow:visible">`;
  meses.forEach(({lbl},i)=>{
    const x=10+i*(bw+bGap),barH=Math.max(4,counts[i]/maxC*(svgH-20)),y=svgH-barH;
    bSvg+=`<rect x="${x}" y="${y}" width="${bw}" height="${barH}" fill="${counts[i]?'var(--accent)':'var(--line)'}"/>`;
    if(counts[i])bSvg+=`<text x="${x+bw/2}" y="${y-4}" text-anchor="middle" font-size="10" font-weight="700" fill="var(--txt)">${counts[i]}</text>`;
    bSvg+=`<text x="${x+bw/2}" y="${svgH+14}" text-anchor="middle" font-size="9" fill="var(--dim)">${lbl}</text>`;
  });
  bSvg+=`</svg>`;
  h+=bSvg+`</div>`;

  // Funil
  h+=`<div class="chart-box"><div class="chart-title">Funil de conversão</div>`;
  const funilSteps=[
    ["Apresentado",apresent+negoc+aprov+reprov,"#7A8C9E"],
    ["Em negociação",negoc+aprov,"#B8956A"],
    ["Aprovado",aprov,"#2A6B47"],
  ];
  const fmax=funilSteps[0][1]||1;
  funilSteps.forEach(([lbl,n,c])=>{
    const pct=Math.round(n/fmax*100);
    h+=`<div class="funil-row">
      <div class="funil-label" style="color:var(--txt)">${lbl}</div>
      <div class="funil-bar-wrap">
        <div class="funil-bar" style="width:${pct}%;background:${c}"></div>
        <div style="position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:10px;font-weight:700;color:#fff;pointer-events:none">${n>0?n:""}</div>
      </div>
      <div class="funil-val">${fmax>0&&n?Math.round(n/fmax*100)+"%":n?"100%":"—"}</div>
    </div>`;
  });
  if(encerradas){
    h+=`<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--line);font-size:11px;display:flex;justify-content:space-between">
      <span style="color:var(--dim)">Taxa de conversão real</span>
      <span style="font-weight:700;color:${conv>=50?"var(--green)":"var(--accent)"}">${conv}%</span>
    </div>`;
  }
  h+=`</div>`;

  // Receita por origem
  h+=`<div class="chart-box"><div class="chart-title">Origem das propostas</div>`;
  const porMeio={};
  ps.forEach(p=>{const m=p.meio||"Outro";porMeio[m]=(porMeio[m]||0)+1;});
  const meioEntries=Object.entries(porMeio).sort((a,b)=>b[1]-a[1]);
  const mMax=meioEntries[0]?.[1]||1;
  meioEntries.forEach(([meio,n])=>{
    h+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:11px">
      <span style="width:90px;color:var(--dim)">${meio}</span>
      <div style="flex:1;height:6px;background:var(--line)"><div style="height:100%;width:${n/mMax*100}%;background:var(--accent)"></div></div>
      <span style="width:20px;font-weight:700;text-align:right">${n}</span>
    </div>`;
  });
  if(!meioEntries.length)h+=`<div style="font-size:11px;color:var(--dim)">Nenhuma proposta ainda.</div>`;
  h+=`</div>`;

  h+=`</div>`; // fecha charts-grid
  return h;
}

function vFinComercial(){
  const ps=S.fin.propostas||[];
  const total=ps.length;
  const aprov=ps.filter(p=>p.status==="Aprovado").length;
  const recus=ps.filter(p=>p.status==="Reprovado"||p.status==="Cancelado").length;
  const decididas=aprov+recus;
  const conv=decididas?Math.round(aprov/decididas*100):0;
  const fat=ps.filter(p=>p.status==="Aprovado").reduce((s,p)=>s+(+(p.valorFechado||p["valor"+(p.pacoteApres||"P2")]||0)),0);
  const ticket=aprov?Math.round(fat/aprov):0;

  let h=`<div class="row" style="margin-bottom:16px;flex-wrap:wrap;gap:8px">
    <div class="sec-title" style="margin:0;border:none;padding:0">Controle de propostas</div>
    <div style="display:flex;gap:8px">
      <button class="btn" data-act="newprop">+ manual</button>
      <button class="btnP" data-act="neworc">+ Novo orçamento</button>
    </div>
  </div>`;

  h+=`<div style="display:flex;align-items:center;border-bottom:1px solid var(--line);margin-bottom:20px;flex-wrap:wrap">
    ${[[total,"Total","var(--txt)"],[conv+"%","Conversão","var(--green)"],[fmtBRL(fat),"Faturamento aprovado","var(--accent)"],[ticket?fmtBRL(ticket):"—","Ticket médio","var(--blue)"]].map(([v,l,c],i)=>`
    <div style="display:flex;align-items:baseline;gap:7px;padding:8px 18px 8px ${i?'18px':'0'};${i?'border-left:1px solid var(--line);':''}">
      <div style="font-size:22px;font-weight:700;color:${c};line-height:1">${v}</div>
      <div style="font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);font-weight:600;white-space:nowrap">${l}</div>
    </div>`).join("")}
  </div>`;

  if(!total)return h+`<div class="empty"><div class="empty-title">Nenhuma proposta registrada</div><div class="muted" style="margin-bottom:16px">Use a calculadora para gerar o orçamento — ele aparece aqui agrupado por status.</div><button class="btnP" data-act="neworc">+ Novo orçamento</button></div>`;

  PROP_GRUPOS.forEach(g=>{
    const lista=ps.filter(p=>g.status.includes(p.status)).sort((a,b)=>(b.num||0)-(a.num||0));
    h+=`<div class="sec-title" style="display:flex;align-items:center;gap:8px;margin-top:8px">
      <span>${g.label}</span><span style="font-size:9px;background:var(--panel2);color:var(--dim);padding:1px 7px;letter-spacing:0;text-transform:none;font-weight:400">${lista.length}</span>
    </div>`;
    if(!lista.length){h+=`<div class="muted" style="margin-bottom:16px">Nenhuma proposta neste status.</div>`;return;}
    lista.forEach(p=>{
      const valorRef=+(p.valorFechado||p["valor"+(p.pacoteApres||"P2")]||p.valorP2||p.valorP1||0);
      const cli=S.clientes.find(c=>c.id===p.clienteId||c.nome===p.cliente);
      const aberto=S.propHistOpen===p.id;
      const hist=(cli?.hist||[]).slice().reverse().slice(0,5);
      h+=`<div style="background:var(--panel);border-bottom:1px solid var(--line)">
        <button data-prop-hist="${p.id}" style="display:flex;align-items:center;gap:10px;padding:10px 14px;width:100%;background:none;border:none;cursor:pointer;font-family:inherit;color:var(--txt);text-align:left">
          <span style="font-size:10px;color:var(--dim);flex-shrink:0">#${p.num||"—"}</span>
          <div style="flex:1;min-width:0">
            <div style="font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(p.cliente||"—")}</div>
            <div style="font-size:9px;color:var(--dim)">${p.data?new Date(p.data+"T12:00:00").toLocaleDateString("pt-BR",{day:"2-digit",month:"short",year:"2-digit"}):"—"} · ${esc(p.tipo||"—")}${p.meio?" · "+esc(p.meio):""}</div>
          </div>
          <div style="font-size:12px;font-weight:700;white-space:nowrap;color:${g.aprovado?"var(--green)":"var(--txt)"}">${valorRef?fmtBRL(valorRef):"—"}</div>
        </button>
        <div style="display:flex;gap:6px;flex-shrink:0;padding:0 14px 10px;flex-wrap:wrap">
          ${cli?`<button class="btn" style="font-size:9px;padding:4px 8px" data-vercliente="${cli.id}">→ Cliente</button>`:""}
          ${g.aprovado
            ?(p.projNome?`<span style="font-size:9px;color:var(--green);white-space:nowrap;align-self:center">→ ${esc(p.projNome)}</span>`:`<button class="btnP" style="font-size:9px;padding:4px 8px" data-mkproj="${p.id}" title="Criar projeto com os dados deste orçamento">→ Projeto</button>`)
            :g.editavel?`<button class="btn" style="font-size:9px;padding:4px 8px" data-editorc="${p.id}">Orçamento</button><button class="btn" style="font-size:9px;padding:4px 8px" data-editprop="${p.id}">Status</button>`
            :`<span class="pill" style="background:${PROP_COR[p.status]||"#999"};color:#fff;font-size:8px;align-self:center">${p.status}</span>`
          }
        </div>
        ${aberto?`<div style="padding:0 14px 12px;border-top:1px solid var(--line);margin-top:0">
          <div style="font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);font-weight:700;margin:10px 0 6px">Histórico de acompanhamento</div>
          ${hist.length?hist.map(ct=>`<div style="display:flex;gap:8px;padding:5px 0;border-bottom:1px solid var(--line);font-size:10px">
            <span style="color:var(--dim);flex-shrink:0;width:60px">${ct.data?new Date(ct.data+"T12:00:00").toLocaleDateString("pt-BR",{day:"2-digit",month:"short"}):""}</span>
            <span style="flex:1">${esc(ct.txt)}</span>
            <span style="color:var(--blue);flex-shrink:0">${esc(ct.tipo||"")}</span>
          </div>`).join(""):`<div style="font-size:10px;color:var(--dim)">Sem registros de histórico ainda.</div>`}
        </div>`:""}
      </div>`;
    });
  });
  return h;
}

    <thead><tr>
      <th>Nº</th><th>Data</th><th>Cliente</th><th>Origem</th><th>P1</th><th>P2</th><th>P3</th><th>Status</th><th>Fechado</th><th></th>

      :(p.valorFechado?`<span style="color:var(--dim);white-space:nowrap">${fmtBRL(+p.valorFechado)}</span>`:`<span style="color:var(--dim)">—</span>`);

      <td style="color:var(--dim);font-weight:600">#${p.num||"—"}</td>

      <td style="font-weight:600;min-width:110px">${esc(p.cliente||"—")}</td>
      <td style="color:var(--dim)">${esc(p.meio||"—")}</td>

      <td>${fechado}</td>
      <td style="white-space:nowrap">

        <button class="btn" style="font-size:9px;padding:4px 8px" data-editprop="${p.id}">Status</button>
        ${p.status==="Aprovado"?(p.projNome
          ?` <span style="font-size:9px;color:var(--green);white-space:nowrap" title="Projeto criado">→ ${esc(p.projNome)}</span>`
          :` <button class="btnP" style="font-size:9px;padding:4px 8px" data-mkproj="${p.id}" title="Criar projeto com os dados deste orçamento">→ Projeto</button>`):""}
      </td>
    </tr>`;

function vFinProjetos(){
  const projs=S.projs;
  let h=`<div class="sec-title">Honorários por projeto</div>`;
  if(!projs.length)return h+`<div class="empty"><div class="empty-title">Nenhum projeto ainda</div></div>`;
  projs.forEach(p=>{
    const custo=custoEstimado(p.nome);
    const sugerido=valorSugerido(p.nome);
    const vc=+(p.valorContratado||0);
    const margem=margemReal(p.nome);
    const margemPct=vc?Math.round((margem||0)/vc*100):null;
    h+=`<div style="background:var(--panel);border-bottom:1px solid var(--line);padding:16px 20px">
      <div class="row" style="flex-wrap:wrap;gap:12px;align-items:flex-start">
        <div style="flex:1;min-width:160px">
          <div style="font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:3px">${esc(p.tipologia)}</div>
          <div style="font-size:15px;font-weight:500;margin-bottom:2px">${esc(p.nome)}</div>
          <div style="font-size:11px;color:var(--dim)">${esc(p.cliente||"—")}</div>
        </div>
        <div style="display:flex;gap:0;border:1px solid var(--line)">
          ${[["Custo interno",fmtBRL(custo),""],["Sugerido",fmtBRL(sugerido),"color:var(--accent)"],["Contratado",vc?fmtBRL(vc):"—","font-weight:600"],["Margem",margem!=null?fmtBRL(margem)+(margemPct!=null?" ("+margemPct+"%)":""):"—",(margem||0)>=0?"color:var(--green)":"color:var(--red)"]].map(([l,v,st],i)=>`
          <div style="padding:10px 14px;${i?"border-left:1px solid var(--line)":""}">

  return h;
}

// ===== CLIENTES =====
function vClientes(){
  if(S.clienteSel){const c=S.clientes.find(x=>x.id===S.clienteSel);if(c)return vCliente(c);S.clienteSel=null;}
  let h=`<div class="row" style="margin-bottom:14px"><div class="sec-title" style="margin:0;border:none;padding:0">Clientes · ${S.clientes.length}</div><button class="btnP" data-act="newcliente">+ Novo cliente</button></div>`;
  if(!S.clientes.length)return h+`<div class="empty"><div class="empty-title">Nenhum cliente cadastrado</div><div class="muted">Clientes são criados automaticamente ao lançar um orçamento — ou cadastre manualmente.</div></div>`;
  S.clientes.forEach(c=>{
    const projs=S.projs.filter(p=>p.cliente===c.nome);
    const props=(S.fin.propostas||[]).filter(p=>p.cliente===c.nome);
    const ini=(c.nome||'?').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
    h+=`<button class="proj" data-cli-open="${c.id}" style="display:flex;align-items:center;gap:12px">
      <div style="width:36px;height:36px;border-radius:50%;background:var(--panel2);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--accent);flex-shrink:0">${esc(ini)}</div>
      <div style="flex:1;min-width:0;text-align:left">
        <div class="proj-nome">${esc(c.nome)}</div>
        <div class="proj-meta">${esc(c.tel||c.email||'—')}${c.origem?' · '+esc(c.origem):''}</div>
      </div>
      <div style="text-align:right;flex-shrink:0;font-size:10px;color:var(--dim)">${projs.length} projeto${projs.length!==1?'s':''}<br/>${props.length} proposta${props.length!==1?'s':''}</div>
    </button>`;
  });
  return h;
}

function vCliente(c){
  const projs=S.projs.filter(p=>p.cliente===c.nome);
  const props=(S.fin.propostas||[]).filter(p=>p.cliente===c.nome);
  let h=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap">
    <button class="btn" data-cli-back="1">← Clientes</button>
    <div style="font-size:16px;font-weight:500;flex:1">${esc(c.nome)}</div>
    <button class="btn" data-editcliente="${c.id}">Editar</button>
  </div>`;
  h+=`<div style="background:var(--panel);border-top:2px solid var(--accent);padding:16px 20px;margin-bottom:16px">
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px">
    ${[["CPF / CNPJ",c.doc],["E-mail",c.email],["Telefone / WhatsApp",c.tel],["Endereço",c.end],["Origem",c.origem],["Observações",c.obs]].map(([l,v])=>`<div><div style="font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);font-weight:700;margin-bottom:3px">${l}</div><div style="font-size:12px">${esc(v||'—')}</div></div>`).join('')}
    </div></div>`;
  h+=`<div class="sec-title">Projetos vinculados · ${projs.length}</div>`;
  if(projs.length)projs.forEach(p=>{h+=`<button class="proj" data-open="${esc(p.nome)}"><div class="row"><div><div class="proj-nome">${esc(p.nome)}</div><div class="proj-meta">${esc(p.tipologia)}${p.m2?' · '+p.m2+'m²':''}</div></div><span class="pill" style="background:${PCOR(p.status)};color:#fff">${p.status}</span></div></button>`;});
  else h+=`<div class="muted" style="margin-bottom:8px">Nenhum projeto ainda.</div>`;
  h+=`<div class="sec-title" style="margin-top:20px">Propostas · ${props.length}</div>`;

// ===== CALCULADORA DE ORÇAMENTO =====
const ORC_PARAM_KEYS=["lucro","impostos","negociacao","taxaCartao1x","taxaCartao10x","revisao"];
function orcParamsDefault(){const p={};ORC_PARAM_KEYS.forEach(k=>p[k]=S.fin[k]||0);p.multi={...S.fin.multi};return p;}
function orcRespDefault(){const r={};const p0=S.equipe[0]?.pessoa||"";ORC_ENT.forEach(e=>r[e.k]=p0);return r;}
function startOrc(){
  const esc0={};ORC_ENT.forEach(e=>esc0[e.k]={p1:e.p1,p2:e.p2,p3:e.p3});
  S.orc={step:0,travado:false,
    cliente:{nome:"",contato:"",tipo:PROP_TIPOS[0],interv:PROP_INTERV[0],meio:PROP_MEIOS[0],validade:"15 dias"},
    ambientes:[{amb:"",m2:0,padrao:"Médio",qtd:1}],
    esc:esc0,terc:[],tercTpl:"",params:orcParamsDefault(),resp:orcRespDefault()};
  loadTercTemplate("Residencial");
  S.modal={t:"orc",d:{}};
}
function loadTercTemplate(tpl){
  const src=(S.fin.tercTemplates||{})[tpl]||TERC_ITENS();
  S.orc.tercTpl=tpl;
  S.orc.terc=src.map(t=>({...t}));
  for(let i=0;i<3;i++)S.orc.terc.push({nome:"",qtd:1,unit:0,p1:0,p2:0,p3:0,custom:1});
}
function orcCalc(o){
  const f={...S.fin,...(o.params||{})};
  if(o.params?.multi)f.multi={...S.fin.multi,...o.params.multi};
  const mult=p=>f.multi[p]||1;
  const m2p=o.ambientes.reduce((s,a)=>s+(+a.m2||0)*mult(a.padrao)*(+a.qtd||1),0);
  const horasEnt=k=>{const ent=ORC_ENT.find(x=>x.k===k);const fat=f.fatores?.[k]!=null?+f.fatores[k]:ent.fator;return fat*m2p;};
  const resp=k=>o.resp?.[k]||S.equipe[0]?.pessoa||"";
  const imp=(f.impostos||0)/100,folga=(f.negociacao||0)/100,lucro=(f.lucro||0)/100;
  const tx10=(f.taxaCartao10x||15)/100,tx1=(f.taxaCartao1x||2)/100,cf=+S.fin.custoFixoHora||0;
  const pctRevPart=(f.revisao||0)/100;
  // participação automática: hrs totais atribuídas a cada pessoa, em todos os entregáveis (independe do pacote)
  const partHoras={};let partTotal=0;
  ORC_ENT.forEach(e=>{const h=horasEnt(e.k)*(1+pctRevPart);const p=resp(e.k);partHoras[p]=(partHoras[p]||0)+h;partTotal+=h;});
  const participacao=Object.entries(partHoras).map(([pessoa,h])=>({pessoa,horas:h,pct:partTotal?Math.round(h/partTotal*1000)/10:0}))
    .sort((a,b)=>b.horas-a.horas);
  const pctRev=(f.revisao||0)/100;
  const pac=p=>{
    let horasBase=0,mo=0;
    ORC_ENT.forEach(e=>{
      if(!o.esc[e.k]?.[p])return;
      const h=horasEnt(e.k)*(1+pctRev);horasBase+=h;
      mo+=h*(taxaHora(resp(e.k))+cf);
    });
    const horas=horasBase;
    const terc=o.terc.filter(t=>t[p]&&(t.nome||'').trim()).reduce((s,t)=>s+(+t.qtd||0)*(+t.unit||0),0);
    const custo=mo+terc;
    const base=custo*(1+lucro);
    const piso=imp<1?base/(1-imp):base;
    const tabela=folga<1?piso/(1-folga):piso;
    const den10=1-imp-tx10,den1=1-imp-tx1;
    const c10=den10>0?base/den10/(1-folga):tabela;
    const c1=den1>0?base/den1/(1-folga):tabela;
    return {horas,mo,terc,custo,base,piso,tabela,c1,c10,liq:base,m2:m2p?tabela/m2p:0};
  };
  return {m2p,participacao,params:f,p1:pac('p1'),p2:pac('p2'),p3:pac('p3')};
}

// Mapeia entregáveis do orçamento → blocos do método (CAT)
const ORC2BLOCO={e01:["01"],e02:["02"],e03:["03"],e04:["04","05"],e05:["06"],e06:["07"],e07:["08"],e08:["09"],e09:["10"],e10:["11"]};
function ativsFromOrc(p,projNome){
  const o=p.orc;if(!o)return null;
  const pk=(p.pacoteApres||"P2").toLowerCase();
  const mult=x=>(o.params?.multi?.[x]??S.fin.multi[x])||1;
  const pctRev=((o.params?.revisao??S.fin.revisao)||0)/100;
  const m2p=(o.ambientes||[]).reduce((s,a)=>s+(+a.m2||0)*mult(a.padrao)*(+a.qtd||1),0);
  if(!m2p)return null;
  const out=[];
  ORC_ENT.forEach(e=>{
    if(!o.esc?.[e.k]?.[pk])return;
    const fat=S.fin.fatores?.[e.k]!=null?+S.fin.fatores[e.k]:e.fator;
    const horasTot=fat*m2p*(1+pctRev);
    const cats=CAT.filter(c=>(ORC2BLOCO[e.k]||[]).includes(c.et));
    const somaDef=cats.reduce((s,c)=>s+c.horas,0)||1;
    const respE=o.resp?.[e.k]||S.equipe[0]?.pessoa||"";
    cats.forEach(c=>{
      out.push({id:uid(),projeto:projNome,n:c.n,resp:respE,horas:Math.max(1,Math.round(horasTot*c.horas/somaDef)),ini:"",fim:"",status:"Planejada"});
    });
  });
  return out.length?out:null;
}

// Sincroniza o planejamento do projeto com o escopo revisado do orçamento.
// Atividades do mesmo tipo (n) mantêm responsável, status, datas; horas são atualizadas.
function syncProjFromOrc(projNome,prop){
  const novo=ativsFromOrc(prop,projNome);
  if(!novo){alert("Defina ambientes com m² para sincronizar o planejamento.");return false;}
  const byN={};S.ativ.filter(a=>a.projeto===projNome).forEach(a=>{(byN[a.n]=byN[a.n]||[]).push(a);});
  const kept=[];
  novo.forEach(na=>{
    const ex=(byN[na.n]||[]).shift();
    if(ex){ex.horas=na.horas;kept.push(ex);}
    else kept.push(na);
  });
  const keptIds=new Set(kept.map(a=>a.id));
  S.ativ.filter(a=>a.projeto===projNome&&!keptIds.has(a.id)).forEach(a=>toTrash("ativ",a));
  S.ativ=S.ativ.filter(a=>a.projeto!==projNome).concat(kept);
  return true;
}

function launchOrc(){
  const o=S.orc;if(!o)return;
  const c=orcCalc(o);
  const nome=(o.cliente.nome||'').trim();
  if(!nome){alert('Informe o nome do cliente no Passo 1.');S.orc.step=0;r();return;}
  let cli=S.clientes.find(x=>(x.nome||'').toLowerCase()===nome.toLowerCase());
  if(!cli){cli={id:uid(),nome,tel:o.cliente.contato||'',doc:'',email:'',end:'',origem:o.cliente.meio||'',obs:'',hist:[]};S.clientes.push(cli);}
  else if(o.cliente.contato&&!cli.tel)cli.tel=o.cliente.contato;
  if(!S.fin.propostas)S.fin.propostas=[];
  const rnd=v=>Math.round(v);
  const snap={cliente:{...o.cliente},ambientes:o.ambientes.map(a=>({...a})),esc:JSON.parse(JSON.stringify(o.esc)),terc:o.terc.map(t=>({...t})),tercTpl:o.tercTpl,params:{...o.params,multi:{...o.params.multi}},resp:{...o.resp}};
  const hoje=new Date().toISOString().slice(0,10);
  if(o.editId){
    const p=S.fin.propostas.find(x=>x.id===o.editId);
    if(p){
      Object.assign(p,{cliente:nome,tipo:o.cliente.tipo,interv:o.cliente.interv,meio:o.cliente.meio,
        valorP1:rnd(c.p1.tabela),valorP2:rnd(c.p2.tabela),valorP3:rnd(c.p3.tabela),
        clienteId:cli.id,orc:snap,
        obs:"Calculadora · "+Math.round(c.m2p)+"m² pond. · validade "+(o.cliente.validade||'15 dias')});
      (cli.hist=cli.hist||[]).push({data:hoje,tipo:"Proposta",txt:"Orçamento #"+p.num+" revisado — P2 "+fmtBRL(rnd(c.p2.tabela))});
    }
  }else{
    const num=S.fin.propostas.length+1;
    S.fin.propostas.push({id:uid(),num,data:hoje,cliente:nome,
      tipo:o.cliente.tipo,interv:o.cliente.interv,meio:o.cliente.meio,
      valorP1:rnd(c.p1.tabela),valorP2:rnd(c.p2.tabela),valorP3:rnd(c.p3.tabela),
      status:"Apresentado",clienteId:cli.id,orc:snap,
      obs:"Calculadora · "+Math.round(c.m2p)+"m² pond. · validade "+(o.cliente.validade||'15 dias')});
    (cli.hist=cli.hist||[]).push({data:hoje,tipo:"Proposta",txt:"Orçamento #"+num+" lançado — P2 "+fmtBRL(rnd(c.p2.tabela))});
  }
  const syncAlvo=o.syncProj;
  if(syncAlvo){
    const propRef=o.editId?S.fin.propostas.find(x=>x.id===o.editId):S.fin.propostas[S.fin.propostas.length-1];
    if(propRef&&confirm('Atualizar o planejamento do projeto "'+syncAlvo+'" com o novo escopo?\n\nAtividades já existentes mantêm responsável, status e datas — só as horas são recalculadas. Etapas removidas do escopo saem do planejamento.')){
      if(syncProjFromOrc(syncAlvo,propRef)){
        propRef.projNome=syncAlvo;
        const cli2=S.clientes.find(x=>x.nome===propRef.cliente);
        if(cli2)(cli2.hist=cli2.hist||[]).push({data:hoje,tipo:"Marco",txt:'Escopo do projeto "'+syncAlvo+'" revisado pelo orçamento #'+propRef.num});
      }
    }
    S.orc=null;S.modal=null;S.proj=syncAlvo;S.tab="projetos";
    save();r();return;
  }
  S.orc=null;S.modal=null;S.tab="comercial";S.comTab="propostas";
  save();r();
}

async function gCreateDoc(tok,name,htmlBody){
  const boundary="oadcontratob";
  const meta={name,mimeType:"application/vnd.google-apps.document"};
  const body="--"+boundary+"\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n"+JSON.stringify(meta)
    +"\r\n--"+boundary+"\r\nContent-Type: text/html; charset=UTF-8\r\n\r\n"+htmlBody
    +"\r\n--"+boundary+"--";
  const r=await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,webViewLink",{
    method:"POST",headers:{Authorization:"Bearer "+tok,"Content-Type":"multipart/related; boundary="+boundary},body});
  if(!r.ok)throw new Error("HTTP "+r.status);
  return r.json();
}
function genContrato(ct){
  if(!SYNC.clientId){alert("Configure a sincronização com o Google Drive em Parâmetros antes de gerar o contrato — é lá que o documento é criado.");return;}
  const tpl=S.fin.contratoTpl||CONTRATO_TPL_DEFAULT;
  const vars=contratoVars(ct);
  let txt=tpl;
  Object.entries(vars).forEach(([k,v])=>{txt=txt.split("{{"+k+"}}").join(String(v));});
  const htmlBody="<div style=\"font-family:Georgia,'Times New Roman',serif;font-size:12pt;line-height:1.8;white-space:pre-wrap\">"+esc(txt)+"</div>";
  gToken(async tok=>{
    if(!tok){alert("Conecte o Google Drive (Parâmetros → Sincronização) para gerar o contrato.");return;}
    try{
      const res=await gCreateDoc(tok,"Contrato - "+ct.nome,htmlBody);
      if(res.webViewLink)window.open(res.webViewLink,"_blank");
      else alert("Contrato criado no Google Drive (pasta raiz).");
    }catch(e){alert("Erro ao gerar o contrato no Drive: "+e.message);}
  },false);
}

function saveContrato(gen){
  const d=S.ctr.d;
  if(!(d.nome||"").trim()){alert("Informe o nome do contrato no Passo 1.");S.ctr.step=0;r();return;}
  if(!(+d.valorTotal)){alert("Informe o valor total no Passo 2.");S.ctr.step=1;r();return;}
  const rest=Math.max(0,(+d.valorTotal||0)-(+d.entrada||0));
  d.valorParcela=+d.numParcelas>0?Math.round(rest/+d.numParcelas*100)/100:0;
  let ct;
  if(S.ctr.editId){
    ct=(S.fin.contratos||[]).find(x=>x.id===S.ctr.editId);
    if(ct){
      const pagas={};(ct.parcelas||[]).forEach(p=>{if(p.pago)pagas[p.label]=p.pagoEm||true;});
      Object.assign(ct,d);
      ct.parcelas=gerarParcelas(d).map(p=>pagas[p.label]?{...p,pago:true,pagoEm:pagas[p.label]===true?null:pagas[p.label]}:p);
    }
  }else{
    ct={...d,id:uid(),parcelas:gerarParcelas(d)};
    S.fin.contratos.push(ct);
    const cli=S.clientes.find(c=>c.nome===ct.cliente);
    if(cli)(cli.hist=cli.hist||[]).push({data:new Date().toISOString().slice(0,10),tipo:"Marco",txt:'Contrato "'+ct.nome+'" cadastrado — '+fmtBRL(+ct.valorTotal||0)});
  }
  S.ctr=null;S.modal=null;S.tab="financeiro";S.finTab="entradas";S.ctrOpen=ct?.id||null;
  save();r();
  if(gen&&ct)genContrato(ct);
}

  // Cabeçalho da tabela
  const cw=c=>c[2]?`width:${c[2]}px;flex-shrink:0`:`flex:1;min-width:90px`;

    h+=`<div style="display:flex;gap:0;border:1px solid var(--line);margin-top:14px;flex-wrap:wrap">

  return h;
}

function especExportCSV(){
  const proj=S.especProj;
  const linhas=S.espec.filter(x=>x.projeto===proj);
  if(!linhas.length){alert("Nenhum item de especificação neste projeto.");return;}
  const rows=[["Pacote","Ambiente","Código","Item/Elemento","Material","Modelo","Acabamento","Espessura","Dimensões","Potência","Quantidade","Unidade","Status","Observações"]];
  ESPEC_PACOTES.forEach(p=>{

      rows.push([p.nome,l.ambiente||"",l.codigo||"",l.item||l.elemento||"",l.material||"",l.modelo||"",l.acabamento||"",l.espessura||"",l.dimensoes||"",l.potencia||"",l.qtd??"",l.un||"",l.status||"Especificado",l.obs||""]);

  });
  const csv=rows.map(r=>r.map(c=>`"${String(c==null?"":c).replace(/"/g,'""')}"`).join(",")).join("\n");
  dl(new Blob(["﻿"+csv],{type:"text/csv;charset=utf-8"}),"Especificacao_"+proj.replace(/[^\w]+/g,"_")+".csv");
}

}
function rdoAddFotos(files){
  Array.from(files||[]).forEach(f=>{
    if(!f.type||f.type.indexOf("image/")!==0)return;
    const rd=new FileReader();
    rd.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        const max=1000;let w=img.width,h=img.height;
        if(w>max||h>max){if(w>=h){h=Math.round(h*max/w);w=max;}else{w=Math.round(w*max/h);h=max;}}
        const cv=document.createElement("canvas");cv.width=w;cv.height=h;
        cv.getContext("2d").drawImage(img,0,0,w,h);
        if(!S.modal||S.modal.t!=="rdo")return;
        (S.modal.d.fotos=S.modal.d.fotos||[]).push(cv.toDataURL("image/jpeg",0.6));
        r();
      };
      img.src=ev.target.result;
    };
    rd.readAsDataURL(f);
  });
}
function genRDO(x){
  const office="Wallisson Oliveira · Arquitetura & Interiores";

  const fotos=(x.fotos||[]).map(f=>`<img src="${f}" style="width:48%;margin:1%;border:1px solid #ccc;object-fit:cover;max-height:150mm"/>`).join("");
  const row=(l,v)=>v?`<tr><td style="font-weight:bold;padding:4px 10px 4px 0;vertical-align:top;white-space:nowrap">${l}</td><td style="padding:4px 0">${v}</td></tr>`:"";
  const docHtml=`<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8"/><title>RDO — ${e2(x.projeto)} — ${rdoDataBR(x.data)}</title>
  <style>body{font-family:Arial,Helvetica,sans-serif;font-size:11pt;color:#1C1917;max-width:180mm;margin:16mm auto;}
  h1{font-size:15pt;margin:0 0 2px}.sub{color:#666;font-size:9pt;text-transform:uppercase;letter-spacing:1px}
  .bar{border-top:3px solid #A6533A;margin:10px 0 14px}table{border-collapse:collapse;font-size:10.5pt}
  h2{font-size:11pt;border-bottom:1px solid #ddd;padding-bottom:3px;margin:18px 0 6px;color:#A6533A}
  .box{white-space:pre-wrap;line-height:1.6}@media print{body{margin:0;padding:12mm}}</style></head><body>
  <div class="sub">${e2(office)}</div>
  <h1>Relatório Diário de Obra</h1>
  <div class="bar"></div>
  <table>
    ${row("Obra:",e2(x.projeto))}
    ${row("Data:",rdoDataBR(x.data)+(x.periodo?" · "+e2(x.periodo):""))}
    ${row("Clima:",e2(x.clima)+(x.temp?" · "+e2(x.temp)+"°C":""))}

    ${row("Responsável:",e2(x.autor))}

  ${x.atividades?`<h2>Atividades executadas</h2><div class="box">${e2(x.atividades)}</div>`:""}
  ${x.ocorrencias?`<h2>Ocorrências / Pendências</h2><div class="box">${e2(x.ocorrencias)}</div>`:""}
  ${x.obs?`<h2>Observações</h2><div class="box">${e2(x.obs)}</div>`:""}

  </body></html>`;
  const w=window.open("","_blank");
  if(!w){alert("Permita pop-ups para gerar o PDF.");return;}
  w.document.write(docHtml);w.document.close();
  setTimeout(()=>w.print(),500);

    let mn=D(dates[0].ini),mx=D(dates[0].fim);
    dates.forEach(a=>{if(D(a.ini)<mn)mn=D(a.ini);if(D(a.fim)>mx)mx=D(a.fim);});
    const d=Math.round((mx-mn)/864e5);return Math.round(d*5/7)+" dias úteis";
  };

  document.querySelectorAll("[data-delcliente]").forEach(b=>b.onclick=()=>{const _c=S.clientes.find(c=>c.id===b.dataset.delcliente);if(_c)toTrash("clientes",_c);S.clientes=S.clientes.filter(c=>c.id!==b.dataset.delcliente);S.clienteSel=null;S.modal=null;save();r();});
  A("[data-add-contato]",()=>{

    A("[data-orc-close]",()=>{S.orc=null;S.modal=null;r();});

    S.ativ.forEach(a=>rows.push([a.projeto,a.n,blocoOf(a.n),atOf(a.n),entOf(a.n),operOf(a.n)?"Operacional":"Entregável",prodOf(a.n),valOf(a.n),a.resp,a.horas,a.ini,a.fim,a.status]));
    const csv=rows.map(r=>r.map(c=>`"${String(c==null?"":c).replace(/"/g,'""')}"`).join(",")).join("\n");
    const b=new Blob(["﻿"+csv],{type:"text/csv;charset=utf-8"});dl(b,"OAD_Sistema_Oliveira.csv");return;
  }
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(S.equipe.map(e=>({Pessoa:e.pessoa,Função:e.funcao,"Horas/dia":e.hd,"Dias/semana":e.ds}))),"EQUIPE");
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(S.projs.map(p=>({Projeto:p.nome,Cliente:p.cliente,Tipologia:p.tipologia,m2:p.m2||"",Padrão:p.padrao||"Médio","Valor Contratado":p.valorContratado||"",Status:p.status}))),"PROJETOS");
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(S.ativ.map(a=>({Projeto:a.projeto,"#":a.n,Bloco:blocoOf(a.n),Atividade:atOf(a.n),Entregável:entOf(a.n),Tipo:operOf(a.n)?"Operacional":"Entregável",Produção:prodOf(a.n),Validação:valOf(a.n),Responsável:a.resp,Horas:a.horas,Início:a.ini,Fim:a.fim,Status:a.status}))),"PLANEJAMENTO");
  XLSX.writeFile(wb,"OAD_Sistema_Oliveira.xlsx");
}
function dl(b,name){const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(u),1000);}
function doImport(e){const f=e.target.files[0];if(!f||typeof XLSX==="undefined"){alert("Importação requer conexão (biblioteca de planilha).");return;}
  const rd=new FileReader();rd.onload=ev=>{const wb=XLSX.read(ev.target.result,{type:"binary"});const nm=v=>typeof v==="number"?XLSX.SSF.format("yyyy-mm-dd",v):String(v||"").slice(0,10);
  if(wb.Sheets["PROJETOS"])S.projs=XLSX.utils.sheet_to_json(wb.Sheets["PROJETOS"]).map(x=>({id:uid(),nome:String(x.Projeto),cliente:String(x.Cliente||""),tipologia:String(x.Tipologia||TIPOS[0]),m2:+x.m2||0,padrao:String(x.Padrão||"Médio"),valorContratado:+x["Valor Contratado"]||0,status:String(x.Status||"Ativo")}));
  if(wb.Sheets["PLANEJAMENTO"])S.ativ=XLSX.utils.sheet_to_json(wb.Sheets["PLANEJAMENTO"]).filter(x=>x.Projeto&&x["#"]).map(x=>({id:uid(),projeto:String(x.Projeto),n:+x["#"],resp:String(x.Responsável||"Você"),horas:+x.Horas||0,ini:nm(x.Início),fim:nm(x.Fim),status:String(x.Status||"Planejada")}));
  save();r();};rd.readAsBinaryString(f);}
r();
// Deep-link: abrir direto numa aba via hash — ex: #comercial, #financeiro/entradas
(function(){
  const hs=(location.hash||"").replace("#","");
  if(!hs||!S.usuario)return;
  const [t,sub]=hs.split("/");
  if(t){S.tab=t;S.proj=null;}
  if(sub){if(t==="financeiro")S.finTab=sub;if(t==="comercial")S.comTab=sub;}
  r();
})();
// Sempre tenta puxar da nuvem ao abrir — mesmo com token expirado o gToken
// tenta renovação silenciosa; antes, um aparelho parado >1h nunca atualizava
// (mas conseguia ENVIAR dados velhos por cima dos novos — causa da dessincronização).
if(SYNC.clientId)syncPull(false);
// Puxa dados da nuvem ao voltar para a aba/janela — cobre o caso de dois
// dispositivos abertos ao mesmo tempo (celular + PC), evitando tela "presa" no passado.
let _lastFocusPull=0;
function _focusPull(){
  if(!SYNC.clientId)return;
  if(Date.now()-_lastFocusPull<15000)return; // no máx. 1 vez a cada 15s
  _lastFocusPull=Date.now();
  syncPull(false);
}
document.addEventListener("visibilitychange",()=>{if(!document.hidden)_focusPull();});
window.addEventListener("focus",_focusPull);
</script>
